name: Advanced Rust Proxy Scanner - SmartPing AI with D1 REST API

on:
  workflow_dispatch:
    inputs:
      force_scan:
        description: 'Force full scan (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      target_location:
        description: 'Override target location'
        required: false
        default: 'AUTO'
        type: string
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours

concurrency:
  group: rust-proxy-scan-d1-advanced
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_CACHE_KEY: v5
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan_detailed.log
  METRICS_FILE: scan_metrics.json
  SCANNER_TIMEOUT: "900"
  MAX_API_RETRIES: "5"
  API_RETRY_BASE_SLEEP: "3"
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH,SE,NO,FI,ES,IT,BR,IN"
  HEALTH_CHECK_TIMEOUT: "10"
  STABILITY_TEST_COUNT: "5"
  MIN_SCORE_THRESHOLD: "50"
  PARALLEL_TEST_WORKERS: "10"

jobs:
  advanced-scan-and-update:
    name: Advanced Scan → AI Scoring → D1 Database Update
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies with intelligent detection
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Installing System Dependencies (Smart Detection)     ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          sudo apt-get update -qq
          
          # Core dependencies
          PACKAGES=(
            jq curl netcat-openbsd build-essential pkg-config
            libssl-dev ca-certificates coreutils bc dnsutils
            iputils-ping traceroute mtr-tiny
          )
          
          echo "=> Installing core packages..."
          sudo apt-get install -y "${PACKAGES[@]}" > /dev/null 2>&1
          
          # Smart GeoIP installation
          if ! command -v geoiplookup &> /dev/null; then
            echo "=> Installing GeoIP tools..."
            sudo apt-get install -y geoip-bin geoip-database > /dev/null 2>&1
          fi
          
          # Verify critical tools
          for tool in jq curl bc geoiplookup ping; do
            if ! command -v "$tool" &> /dev/null; then
              echo "❌ FATAL: Required tool '$tool' not found after installation"
              exit 1
            fi
          done
          
          sudo apt-get clean
          echo "✅ All system dependencies verified and ready"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-cache-${{ env.RUST_CACHE_KEY }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-cache-${{ env.RUST_CACHE_KEY }}-${{ runner.os }}-

      - name: Build Rust scanner with optimizations
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Building Rust Scanner (Release + Optimizations)      ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          export RUSTFLAGS="-C target-cpu=native -C opt-level=3"
          
          if ! cargo build --release 2>&1 | tee build-output.log; then
            echo "❌ Build failed. Last 300 lines:"
            tail -n 300 build-output.log
            exit 1
          fi
          
          if [ ! -f "${{ env.SCAN_BINARY }}" ]; then
            echo "❌ Scanner binary not found at expected path"
            ls -la target/release/ || true
            exit 1
          fi
          
          chmod +x "${{ env.SCAN_BINARY }}"
          echo "✅ Build completed successfully"
          ls -lh "${{ env.SCAN_BINARY }}"

      - name: Execute advanced multi-phase scanning
        id: scan
        timeout-minutes: 20
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Phase 1: Network Discovery & Initial Scanning         ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          METRICS="${{ env.METRICS_FILE }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          FORCE_SCAN="${{ github.event.inputs.force_scan }}"
          
          # Create working directory
          WORK_DIR=$(mktemp -d)
          trap "rm -rf '$WORK_DIR'" EXIT
          
          RAW_SCAN="$WORK_DIR/raw_scan.log"
          LIVE_IPS="$WORK_DIR/live_ips.txt"
          SCORED_RESULTS="$WORK_DIR/scored_results.json"
          
          # Initialize files
          : > "$LOG"
          : > "$RAW_SCAN"
          
          # Run primary scanner
          echo "=> Starting network scanner..."
          START_TIME=$(date +%s)
          
          set +e
          timeout "${TIMEOUT}s" "$BIN" > "$RAW_SCAN" 2>&1
          SCAN_EXIT=$?
          set -e
          
          END_TIME=$(date +%s)
          SCAN_DURATION=$((END_TIME - START_TIME))
          
          if [ "$SCAN_EXIT" -eq 0 ]; then
            echo "✅ Scanner completed in ${SCAN_DURATION}s"
          elif [ "$SCAN_EXIT" -eq 124 ]; then
            echo "⚠️  Scanner timeout (${TIMEOUT}s) - using partial results"
          else
            echo "⚠️  Scanner exit code $SCAN_EXIT - continuing with available data"
          fi
          
          cp "$RAW_SCAN" "$LOG"
          
          # Parse live IPs with enhanced validation
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Phase 2: IP Validation & GeoIP Classification        ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          awk 'BEGIN{IGNORECASE=1}
            /PROXY[[:space:]]+LIVE/ {
              if (match($0, /\(([[:space:]]*([0-9]+)[[:space:]]*m?s)[[:space:]]*\)/, a)) {
                lat = a[2];
                gsub(/[^0-9]/,"",lat);
              } else next;
              
              if (match($0, /([0-9]{1,3}(\.[0-9]{1,3}){3})/, ip)) {
                split(ip[1], oct, ".")
                valid = 1
                for (i in oct) {
                  if (oct[i] < 0 || oct[i] > 255) valid = 0
                }
                if (valid && lat+0 > 0 && lat+0 < 10000) {
                  print lat+0, ip[1]
                }
              }
            }' "$RAW_SCAN" | sort -n -k1,1 > "$LIVE_IPS"
          
          TOTAL_IPS=$(wc -l < "$LIVE_IPS")
          echo "=> Discovered $TOTAL_IPS valid live proxies"
          
          if [ "$TOTAL_IPS" -eq 0 ]; then
            echo "❌ No live proxies discovered in scan"
            exit 1
          fi
          
          # Determine target location
          RUN_NUMBER=${{ github.run_number }}
          TARGET_LOC="${{ github.event.inputs.target_location }}"
          
          if [ "$TARGET_LOC" = "AUTO" ] || [ -z "$TARGET_LOC" ]; then
            IFS=',' read -ra LOCATIONS <<< "${{ env.PRIORITY_LOCATIONS }}"
            LOC_COUNT=${#LOCATIONS[@]}
            TARGET_INDEX=$((RUN_NUMBER % LOC_COUNT))
            TARGET_LOC="${LOCATIONS[$TARGET_INDEX]}"
          fi
          
          echo "🌍 Target Location: $TARGET_LOC (Run #$RUN_NUMBER)"
          
          # Advanced health testing function
          test_proxy_health() {
            local ip=$1
            local score=0
            local details=""
            
            # ICMP ping test (20 points)
            if ping -c 3 -W 2 "$ip" > /dev/null 2>&1; then
              score=$((score + 20))
              details="${details}PING:OK "
            else
              details="${details}PING:FAIL "
            fi
            
            # TCP connectivity test (15 points)
            if timeout 3 nc -zv "$ip" 443 > /dev/null 2>&1; then
              score=$((score + 15))
              details="${details}TCP:OK "
            else
              details="${details}TCP:FAIL "
            fi
            
            # DNS resolution test (10 points)
            if timeout 3 nc -zv "$ip" 53 > /dev/null 2>&1; then
              score=$((score + 10))
              details="${details}DNS:OK "
            else
              details="${details}DNS:FAIL "
            fi
            
            echo "$score|$details"
          }
          
          # Calculate stability score
          calc_stability() {
            local ip=$1
            local test_count=3
            local success=0
            
            for i in $(seq 1 $test_count); do
              if ping -c 1 -W 1 "$ip" > /dev/null 2>&1; then
                success=$((success + 1))
              fi
              sleep 0.2
            done
            
            echo "scale=2; ($success * 100) / $test_count" | bc
          }
          
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Phase 3: Advanced Health Testing & AI Scoring        ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          > "$SCORED_RESULTS"
          PROCESSED=0
          
          while read -r initial_latency ip; do
            PROCESSED=$((PROCESSED + 1))
            
            # Get GeoIP location
            GEO_INFO=$(geoiplookup "$ip" 2>/dev/null | awk -F': ' '/GeoIP Country Edition:/ {print $2}' | cut -d',' -f1 | tr -d ' ' || echo "XX")
            
            # Location matching score (25 points if matches target)
            if [ "$GEO_INFO" = "$TARGET_LOC" ]; then
              LOC_SCORE=25
              LOC_MATCH="true"
            else
              LOC_SCORE=0
              LOC_MATCH="false"
            fi
            
            # Run health tests
            HEALTH_RESULT=$(test_proxy_health "$ip")
            HEALTH_SCORE=$(echo "$HEALTH_RESULT" | cut -d'|' -f1)
            HEALTH_DETAILS=$(echo "$HEALTH_RESULT" | cut -d'|' -f2)
            
            # Calculate stability
            STABILITY=$(calc_stability "$ip")
            STABILITY_SCORE=$(echo "scale=0; $STABILITY / 5" | bc)
            
            # Latency score (inverse relationship, max 20 points)
            if [ "$initial_latency" -lt 50 ]; then
              LAT_SCORE=20
            elif [ "$initial_latency" -lt 100 ]; then
              LAT_SCORE=15
            elif [ "$initial_latency" -lt 200 ]; then
              LAT_SCORE=10
            elif [ "$initial_latency" -lt 500 ]; then
              LAT_SCORE=5
            else
              LAT_SCORE=1
            fi
            
            # Calculate total weighted score
            TOTAL_SCORE=$((LOC_SCORE + HEALTH_SCORE + STABILITY_SCORE + LAT_SCORE))
            
            # Store as JSON line
            jq -n \
              --arg ip "$ip" \
              --arg loc "$GEO_INFO" \
              --arg lat "$initial_latency" \
              --arg score "$TOTAL_SCORE" \
              --arg health "$HEALTH_SCORE" \
              --arg stab "$STABILITY" \
              --arg match "$LOC_MATCH" \
              --arg details "$HEALTH_DETAILS" \
              '{
                ip: $ip,
                location: $loc,
                latency: ($lat | tonumber),
                total_score: ($score | tonumber),
                health_score: ($health | tonumber),
                stability: ($stab | tonumber),
                location_match: ($match == "true"),
                health_details: $details,
                tested_at: now | todate
              }' >> "$SCORED_RESULTS"
            
            if [ $((PROCESSED % 5)) -eq 0 ]; then
              echo "   Processed: $PROCESSED/$TOTAL_IPS IPs..."
            fi
          done < "$LIVE_IPS"
          
          echo "✅ Completed testing $PROCESSED proxies"
          
          # Select best proxy based on comprehensive scoring
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Phase 4: Intelligent Selection & Ranking             ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          BEST_PROXY=$(jq -s 'sort_by(-.total_score) | .[0]' "$SCORED_RESULTS")
          
          BEST_IP=$(echo "$BEST_PROXY" | jq -r '.ip')
          BEST_SCORE=$(echo "$BEST_PROXY" | jq -r '.total_score')
          BEST_LAT=$(echo "$BEST_PROXY" | jq -r '.latency')
          BEST_LOC=$(echo "$BEST_PROXY" | jq -r '.location')
          BEST_HEALTH=$(echo "$BEST_PROXY" | jq -r '.health_score')
          BEST_STAB=$(echo "$BEST_PROXY" | jq -r '.stability')
          
          echo "🏆 BEST PROXY SELECTED:"
          echo "   IP:              $BEST_IP"
          echo "   Total Score:     $BEST_SCORE/100"
          echo "   Latency:         ${BEST_LAT}ms"
          echo "   Location:        $BEST_LOC"
          echo "   Health Score:    $BEST_HEALTH/45"
          echo "   Stability:       ${BEST_STAB}%"
          
          # Generate top 10 ranking
          TOP_10=$(jq -s 'sort_by(-.total_score) | .[0:10]' "$SCORED_RESULTS")
          echo "$TOP_10" > "$WORK_DIR/top_10_proxies.json"
          
          # Create metrics summary
          jq -n \
            --arg total "$TOTAL_IPS" \
            --arg processed "$PROCESSED" \
            --arg duration "$SCAN_DURATION" \
            --arg target "$TARGET_LOC" \
            --argjson best "$BEST_PROXY" \
            --argjson top10 "$TOP_10" \
            '{
              scan_metadata: {
                total_discovered: ($total | tonumber),
                total_tested: ($processed | tonumber),
                scan_duration_seconds: ($duration | tonumber),
                target_location: $target,
                timestamp: now | todate
              },
              best_proxy: $best,
              top_10_ranking: $top10
            }' > "$METRICS"
          
          # Set outputs
          echo "bestip=$BEST_IP" >> "$GITHUB_OUTPUT"
          echo "location=$BEST_LOC" >> "$GITHUB_OUTPUT"
          echo "latency=$BEST_LAT" >> "$GITHUB_OUTPUT"
          echo "score=$BEST_SCORE" >> "$GITHUB_OUTPUT"
          echo "health=$BEST_HEALTH" >> "$GITHUB_OUTPUT"
          echo "stability=$BEST_STAB" >> "$GITHUB_OUTPUT"
          echo "total_tested=$PROCESSED" >> "$GITHUB_OUTPUT"
          
          echo "✅ Scanning and scoring completed successfully"

      - name: Initialize Cloudflare D1 database schema
        id: init_db
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Initializing D1 Database Schema (REST API)           ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          # Verify required secrets
          for var in CF_ACCOUNT_ID CF_API_TOKEN D1_DATABASE_ID; do
            if [ -z "${!var}" ]; then
              echo "❌ ERROR: Secret $var is not set"
              exit 1
            fi
          done
          
          API_BASE="https://api.cloudflare.com/client/v4"
          DB_ENDPOINT="${API_BASE}/accounts/${CF_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query"
          
          # Create comprehensive schema
          SCHEMA_SQL='CREATE TABLE IF NOT EXISTS proxy_scans (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            ip TEXT NOT NULL,
            location TEXT NOT NULL,
            latency INTEGER NOT NULL,
            total_score INTEGER NOT NULL,
            health_score INTEGER NOT NULL,
            stability REAL NOT NULL,
            target_location TEXT NOT NULL,
            scan_timestamp TEXT NOT NULL,
            is_current_best INTEGER DEFAULT 0,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP
          );
          CREATE INDEX IF NOT EXISTS idx_score ON proxy_scans(total_score DESC);
          CREATE INDEX IF NOT EXISTS idx_ip ON proxy_scans(ip);
          CREATE INDEX IF NOT EXISTS idx_timestamp ON proxy_scans(scan_timestamp DESC);
          CREATE INDEX IF NOT EXISTS idx_current_best ON proxy_scans(is_current_best);
          CREATE TABLE IF NOT EXISTS scan_metadata (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            scan_id INTEGER NOT NULL,
            total_discovered INTEGER NOT NULL,
            total_tested INTEGER NOT NULL,
            scan_duration_seconds INTEGER NOT NULL,
            workflow_run_number INTEGER NOT NULL,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP
          );'
          
          # Execute schema creation
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DB_ENDPOINT" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg sql "$SCHEMA_SQL" '{sql: $sql}')")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "200" ]; then
            SUCCESS=$(echo "$BODY" | jq -r '.success // false')
            if [ "$SUCCESS" = "true" ]; then
              echo "✅ Database schema initialized successfully"
            else
              echo "⚠️  Schema response: $BODY"
              ERRORS=$(echo "$BODY" | jq -r '.errors[]?.message // empty' | head -5)
              if [ -n "$ERRORS" ]; then
                echo "Errors: $ERRORS"
              fi
            fi
          else
            echo "❌ Schema creation failed with HTTP $HTTP_CODE"
            echo "$BODY" | jq '.' || echo "$BODY"
            exit 1
          fi

      - name: Store results in D1 database with advanced features
        id: store_d1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          BEST_IP: ${{ steps.scan.outputs.bestip }}
          LOCATION: ${{ steps.scan.outputs.location }}
          LATENCY: ${{ steps.scan.outputs.latency }}
          SCORE: ${{ steps.scan.outputs.score }}
          HEALTH: ${{ steps.scan.outputs.health }}
          STABILITY: ${{ steps.scan.outputs.stability }}
          TOTAL_TESTED: ${{ steps.scan.outputs.total_tested }}
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Storing Scan Results in D1 Database                  ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          API_BASE="https://api.cloudflare.com/client/v4"
          DB_ENDPOINT="${API_BASE}/accounts/${CF_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query"
          MAX_RETRIES="${{ env.MAX_API_RETRIES }}"
          SLEEP_BASE="${{ env.API_RETRY_BASE_SLEEP }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_NUM=${{ github.run_number }}
          
          # Function for executing D1 queries with retry logic
          execute_d1_query() {
            local sql=$1
            local description=$2
            local attempt=0
            
            while [ $attempt -lt $MAX_RETRIES ]; do
              attempt=$((attempt + 1))
              
              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DB_ENDPOINT" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$(jq -n --arg sql "$sql" '{sql: $sql}')")
              
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | head -n-1)
              
              if [ "$HTTP_CODE" = "200" ]; then
                SUCCESS=$(echo "$BODY" | jq -r '.success // false')
                if [ "$SUCCESS" = "true" ]; then
                  echo "✅ $description (attempt $attempt)"
                  echo "$BODY"
                  return 0
                else
                  echo "⚠️  API returned success=false for: $description"
                  echo "$BODY" | jq '.'
                fi
              else
                echo "⚠️  HTTP $HTTP_CODE for: $description (attempt $attempt/$MAX_RETRIES)"
              fi
              
              if [ $attempt -lt $MAX_RETRIES ]; then
                sleep_time=$((SLEEP_BASE * attempt))
                echo "   Retrying in ${sleep_time}s..."
                sleep $sleep_time
              fi
            done
            
            echo "❌ Failed after $MAX_RETRIES attempts: $description"
            return 1
          }
          
          # Step 1: Reset previous "current best" flags
          echo "=> Resetting previous best flags..."
          RESET_SQL="UPDATE proxy_scans SET is_current_best = 0 WHERE is_current_best = 1"
          execute_d1_query "$RESET_SQL" "Reset previous best flags" || true
          
          # Step 2: Insert new scan result
          echo ""
          echo "=> Inserting new scan result..."
          INSERT_SQL="INSERT INTO proxy_scans (
            ip, location, latency, total_score, health_score, 
            stability, target_location, scan_timestamp, is_current_best
          ) VALUES (
            '${BEST_IP}', '${LOCATION}', ${LATENCY}, ${SCORE}, 
            ${HEALTH}, ${STABILITY}, '${{ env.PRIORITY_LOCATIONS }}', 
            '${TIMESTAMP}', 1
          )"
          
          if ! execute_d1_query "$INSERT_SQL" "Insert scan result"; then
            echo "❌ Failed to insert scan result"
            exit 1
          fi
          
          # Get the inserted row ID
          LAST_ID_SQL="SELECT last_insert_rowid() as id"
          LAST_ID_RESPONSE=$(execute_d1_query "$LAST_ID_SQL" "Get last insert ID")
          SCAN_ID=$(echo "$LAST_ID_RESPONSE" | jq -r '.result[0].results[0].id // 0')
          
          echo "   Inserted with ID: $SCAN_ID"
          
          # Step 3: Insert metadata
          echo ""
          echo "=> Inserting scan metadata..."
          META_SQL="INSERT INTO scan_metadata (
            scan_id, total_discovered, total_tested, 
            scan_duration_seconds, workflow_run_number
          ) VALUES (
            ${SCAN_ID}, ${TOTAL_TESTED}, ${TOTAL_TESTED}, 
            0, ${RUN_NUM}
          )"
          
          execute_d1_query "$META_SQL" "Insert metadata" || true
          
          # Step 4: Verification query
          echo ""
          echo "=> Verifying stored data..."
          VERIFY_SQL="SELECT * FROM proxy_scans WHERE id = ${SCAN_ID}"
          VERIFY_RESPONSE=$(execute_d1_query "$VERIFY_SQL" "Verify insertion")
          
          STORED_IP=$(echo "$VERIFY_RESPONSE" | jq -r '.result[0].results[0].ip // empty')
          
          if [ "$STORED_IP" = "$BEST_IP" ]; then
            echo "✅ Data verification passed"
          else
            echo "⚠️  Verification mismatch! Stored: '$STORED_IP', Expected: '$BEST_IP'"
          fi
          
          # Step 5: Cleanup old records (keep last 1000)
          echo ""
          echo "=> Cleaning up old records..."
          CLEANUP_SQL="DELETE FROM proxy_scans WHERE id NOT IN (
            SELECT id FROM proxy_scans ORDER BY created_at DESC LIMIT 1000
          )"
          execute_d1_query "$CLEANUP_SQL" "Cleanup old records" || true
          
          # Step 6: Generate summary statistics
          echo ""
          echo "=> Generating statistics..."
          STATS_SQL="SELECT 
            COUNT(*) as total_records,
            COUNT(DISTINCT ip) as unique_ips,
            AVG(total_score) as avg_score,
            MAX(total_score) as max_score,
            AVG(latency) as avg_latency
          FROM proxy_scans
          WHERE scan_timestamp >= datetime('now', '-7 days')"
          
          STATS_RESPONSE=$(execute_d1_query "$STATS_SQL" "Get statistics")
          
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  D1 DATABASE UPDATE SUMMARY                            ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo "IP:              $BEST_IP"
          echo "Location:        $LOCATION"
          echo "Latency:         ${LATENCY}ms"
          echo "Total Score:     ${SCORE}/100"
          echo "Health Score:    ${HEALTH}/45"
          echo "Stability:       ${STABILITY}%"
          echo "Scan ID:         $SCAN_ID"
          echo "Timestamp:       $TIMESTAMP"
          echo ""
          echo "Database Statistics (Last 7 Days):"
          echo "$STATS_RESPONSE" | jq -r '.result[0].results[0] | 
            "  Total Records:   \(.total_records)",
            "  Unique IPs:      \(.unique_ips)",
            "  Avg Score:       \(.avg_score)",
            "  Max Score:       \(.max_score)",
            "  Avg Latency:     \(.avg_latency)ms"' || echo "  (Statistics unavailable)"
          echo "╚════════════════════════════════════════════════════════╝"
          
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"

      - name: Query and display top performers
        if: success()
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Top 10 Performing Proxies (All Time)                 ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
