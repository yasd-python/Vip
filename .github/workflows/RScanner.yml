  cleanup-old-runs:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    needs: advanced-scan-and-update
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 10

  database-maintenance:
    name: Database Maintenance & Optimization
    runs-on: ubuntu-latest
    needs: advanced-scan-and-update
    if: success()
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
    steps:
      - name: Optimize database and create backup
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Database Maintenance & Optimization                   ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          API_BASE="https://api.cloudflare.com/client/v4"
          DB_ENDPOINT="${API_BASE}/accounts/${CF_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query"
          
          execute_query() {
            local sql=$1
            local desc=$2
            
            RESPONSE=$(curl -s -X POST "$DB_ENDPOINT" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg sql "$sql" '{sql: $sql}')")
            
            SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
            if [ "$SUCCESS" = "true" ]; then
              echo "✅ $desc"
              return 0
            else
              echo "⚠️  $desc failed"
              return 1
            fi
          }
          
          # Analyze database performance
          echo "=> Analyzing database statistics..."
          ANALYZE_SQL="SELECT 
            COUNT(*) as total_records,
            COUNT(DISTINCT ip) as unique_ips,
            COUNT(DISTINCT location) as unique_locations,
            MIN(created_at) as oldest_record,
            MAX(created_at) as newest_record,
            AVG(total_score) as avg_score,
            MAX(total_score) as max_score,
            MIN(total_score) as min_score
          FROM proxy_scans"
          
          STATS=$(curl -s -X POST "$DB_ENDPOINT" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg sql "$ANALYZE_SQL" '{sql: $sql}')")
          
          echo "$STATS" | jq -r '.result[0].results[0] | 
            "Total Records:     \(.total_records)",
            "Unique IPs:        \(.unique_ips)",
            "Unique Locations:  \(.unique_locations)",
            "Oldest Record:     \(.oldest_record)",
            "Newest Record:     \(.newest_record)",
            "Average Score:     \(.avg_score)",
            "Max Score:         \(.max_score)",
            "Min Score:         \(.min_score)"' || true
          
          # Remove duplicate entries (keep best score)
          echo ""
          echo "=> Removing duplicate entries..."
          DEDUP_SQL="DELETE FROM proxy_scans WHERE id NOT IN (
            SELECT MIN(id) FROM proxy_scans 
            GROUP BY ip, location, scan_timestamp
          )"
          execute_query "$DEDUP_SQL" "Deduplication" || true
          
          # Archive old low-performing records
          echo ""
          echo "=> Archiving old low-performing records..."
          ARCHIVE_SQL="DELETE FROM proxy_scans 
          WHERE total_score < ${{ env.MIN_SCORE_THRESHOLD }} 
          AND created_at < datetime('now', '-30 days')
          AND is_current_best = 0"
          execute_query "$ARCHIVE_SQL" "Archive low performers" || true
          
          # Vacuum and optimize
          echo ""
          echo "=> Optimizing database..."
          execute_query "VACUUM" "Database vacuum" || true
          execute_query "ANALYZE" "Statistics update" || true
          
          echo ""
          echo "✅ Database maintenance completed successfully"

  performance-analytics:
    name: Generate Performance Analytics
    runs-on: ubuntu-latest
    needs: advanced-scan-and-update
    if: success()
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
    steps:
      - name: Generate trend analysis
        run: |
          set -euo pipefail
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Performance Trend Analysis                            ║"
          echo "╚════════════════════════════════════════════════════════╝"
          
          API_BASE="https://api.cloudflare.com/client/v4"
          DB_ENDPOINT="${API_BASE}/accounts/${CF_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query"
          
          # Last 24 hours trend
          TREND_SQL="SELECT 
            strftime('%Y-%m-%d %H:00', created_at) as hour,
            AVG(total_score) as avg_score,
            AVG(latency) as avg_latency,
            COUNT(*) as scan_count
          FROM proxy_scans
          WHERE created_at >= datetime('now', '-24 hours')
          GROUP BY hour
          ORDER BY hour DESC"
          
          echo "📈 Performance Trend (Last 24 Hours):"
          echo ""
          
          curl -s -X POST "$DB_ENDPOINT" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg sql "$TREND_SQL" '{sql: $sql}')" | \
            jq -r '.result[0].results[] | 
              "\(.hour) | Score: \(.avg_score) | Latency: \(.avg_latency)ms | Scans: \(.scan_count)"' || \
            echo "Unable to retrieve trend data"
          
          # Location distribution
          echo ""
          echo "🌍 Location Distribution (Last 7 Days):"
          echo ""
          
          LOCATION_SQL="SELECT 
            location,
            COUNT(*) as count,
            AVG(total_score) as avg_score,
            AVG(latency) as avg_latency
          FROM proxy_scans
          WHERE created_at >= datetime('now', '-7 days')
          GROUP BY location
          ORDER BY count DESC
          LIMIT 10"
          
          curl -s -X POST "$DB_ENDPOINT" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n --arg sql "$LOCATION_SQL" '{sql: $sql}')" | \
            jq -r '.result[0].results[] | 
              "\(.location): \(.count) scans | Avg Score: \(.avg_score) | Avg Latency: \(.avg_latency)ms"' || \
            echo "Unable to retrieve location data"
          
          echo ""
          echo "✅ Analytics generation completed"
