name: Rust Proxy Scanner - SmartPing Adaptive AI (D1 only) - FINAL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

concurrency:
  group: rust-proxy-smartping-d1-final
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  # Runner-level toggles (change before running)
  TARGETS: ""                          # <-- put your target list/ranges here, e.g. "198.51.100.0/24,203.0.113.5"
  USE_MASSCAN: "true"
  USE_ZMAP: "false"
  USE_RSCANNER: "false"
  SCAN_BINARY: ./target/release/RScanner

  # Core scanner timeouts / limits
  SCANNER_TIMEOUT: "600"                # seconds
  MASSCAN_RATE: "10000"                # packets/sec
  ZMAP_BANDWIDTH: "50M"                # example for zmap -B
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  REAL_PING_TESTS: "3"

  # TCP test
  TCP_CONNECT_TESTS: "1"
  TCP_TEST_PORT: "443"

  # Health & throughput
  HEALTH_URL_PATH: "/favicon.ico"
  HEALTH_HTTP_TIMEOUT: "5"
  TLS_TEST_PORT: "443"
  TLS_TIMEOUT: "5"

  THROUGHPUT_TEST_URL: "https://speed.cloudflare.com/__down"
  THROUGHPUT_TEST_BYTES: "10000000"
  THROUGHPUT_TEST_COUNT: "3"
  THROUGHPUT_TIMEOUT: "30"

  # Scoring weights
  W_SCANNER_LATENCY: "0.18"
  W_REAL_PING: "0.22"
  W_TCP_RTT: "0.05"
  W_THROUGHPUT: "0.25"
  W_TLS_HANDSHAKE: "0.10"
  W_HEALTH: "0.10"
  W_STABILITY: "0.05"
  W_GEO_BONUS: "200"

  # Behavior flags
  DRY_RUN: "false"
  DEBUG: "false"

  # Outputs
  METRICS_OUTPUT: "metrics.ndjson"
  SUMMARY_OUTPUT: "scan_summary.json"

jobs:
  smartping:
    name: Build → Discover (Masscan/ZMap/RScanner) → Nmap → Advanced Tests → Score → Save → D1
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies & scanning tools
        run: |
          set -euo pipefail

          # Use shell env variables inside run blocks
          sudo apt-get update -y
          sudo apt-get install -y jq curl geoip-bin build-essential pkg-config libssl-dev ca-certificates coreutils iputils-ping netcat-openbsd openssl nmap git cmake nodejs npm

          # install masscan if not present
          if ! command -v masscan &>/dev/null; then
            sudo apt-get install -y libpcap-dev
            rm -rf /tmp/masscan
            git clone https://github.com/robertdavidgraham/masscan /tmp/masscan || true
            (cd /tmp/masscan && make -j"$(nproc)") || true
            if [ -f /tmp/masscan/bin/masscan ]; then
              sudo cp /tmp/masscan/bin/masscan /usr/local/bin/
            fi
          fi

          # optional zmap (may require libpcap-dev and libgcrypt)
          if [ "$USE_ZMAP" = "true" ] && ! command -v zmap &>/dev/null; then
            sudo apt-get install -y libgcrypt20-dev libpcap-dev
            rm -rf /tmp/zmap
            git clone https://github.com/zmap/zmap /tmp/zmap || true
            (cd /tmp/zmap && mkdir -p build && cd build && cmake .. && make -j"$(nproc)") || true
            if [ -f /tmp/zmap/build/src/zmap ]; then
              sudo cp /tmp/zmap/build/src/zmap /usr/local/bin/
            fi
          fi

          # install httpx (ProjectDiscovery) if available
          if ! command -v httpx &>/dev/null; then
            curl -sSfL https://raw.githubusercontent.com/projectdiscovery/httpx/master/install.sh | bash -s -- -b /usr/local/bin || true
          fi

          echo "✅ System and scanning tools installed"

      - name: Install Rust toolchain (stable)
        if: ${{ env.USE_RSCANNER == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build RScanner (optional)
        if: ${{ env.USE_RSCANNER == 'true' }}
        run: |
          set -euo pipefail
          cargo build --release
          ls -lah target/release || true

      - name: Discovery phase (Masscan / ZMap / RScanner) and collect IPs
        id: discover
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          OUT_DIR="${TMPDIR}/out"
          mkdir -p "$OUT_DIR"
          echo "Targets: ${TARGETS}"
          : > "${OUT_DIR}/discovered.txt"

          # helper to normalize and append unique IPs
          append_ips() {
            sed -n 's/^[[:space:]]*//;s/[[:space:]]*$//;/^$/d;p' | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' | sort -u >> "${OUT_DIR}/discovered.txt" || true
          }

          # 1) RScanner (if enabled)
          if [ "${USE_RSCANNER}" = "true" ] && [ -x "${SCAN_BINARY}" ]; then
            echo "Running RScanner (user-provided binary)..."
            timeout "${SCANNER_TIMEOUT}s" "${SCAN_BINARY}" > "${OUT_DIR}/rscanner.log" 2>&1 || true
            grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' "${OUT_DIR}/rscanner.log" | sort -u >> "${OUT_DIR}/discovered.txt" || true
          fi

          # 2) Masscan (if enabled)
          if [ "${USE_MASSCAN}" = "true" ] && command -v masscan &>/dev/null; then
            if [ -z "${TARGETS}" ]; then
              echo "SKIP masscan: TARGETS not set"
            else
              echo "Running masscan on ${TARGETS} (rate=${MASSCAN_RATE})"
              masscan -p80,443 ${TARGETS} --rate "${MASSCAN_RATE}" -oL "${OUT_DIR}/masscan.out" || true
              grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' "${OUT_DIR}/masscan.out" | sort -u >> "${OUT_DIR}/discovered.txt" || true
            fi
          fi

          # 3) ZMap (if enabled) - WARNING: ZMap can be very disruptive; use only with permission
          if [ "${USE_ZMAP}" = "true" ] && command -v zmap &>/dev/null; then
            if [ -z "${TARGETS}" ]; then
              echo "SKIP zmap: TARGETS not set"
            else
              echo "Running zmap (careful!)"
              IFS=',' read -ra ADDR <<< "${TARGETS}"
              for t in "${ADDR[@]}"; do
                safe_name=$(echo "${t}" | tr '/,' '__')
                zmap -p 80 "${t}" -B "${ZMAP_BANDWIDTH}" -o "${OUT_DIR}/zmap_${safe_name}.csv" || true
                cut -d',' -f1 "${OUT_DIR}/zmap_${safe_name}.csv" 2>/dev/null | sort -u >> "${OUT_DIR}/discovered.txt" || true
              done
            fi
          fi

          # normalize unique IPs
          sort -u "${OUT_DIR}/discovered.txt" -o "${OUT_DIR}/discovered.txt" || true
          echo "Discovered IPs:"
          cat "${OUT_DIR}/discovered.txt" || true

          # persist discovered list to workspace
          mkdir -p "${GITHUB_WORKSPACE}/scan_results"
          cp "${OUT_DIR}/discovered.txt" "${GITHUB_WORKSPACE}/scan_results/discovered.txt" || true

          # set output for downstream steps (use GITHUB_OUTPUT)
          echo "discovered_file=${GITHUB_WORKSPACE}/scan_results/discovered.txt" >> "${GITHUB_OUTPUT}"

      - name: Run Nmap (service/version/os detection) on discovered IPs
        if: always()
        id: nmap
        run: |
          set -euo pipefail
          DISC="${{ steps.discover.outputs.discovered_file }}"
          OUTDIR="${GITHUB_WORKSPACE}/scan_results"
          mkdir -p "$OUTDIR"
          if [ ! -s "$DISC" ]; then
            echo "No discovered IPs to nmap. Exiting nmap step."
            exit 0
          fi
          echo "Running Nmap -sV -O on discovered hosts (this can be slow)..."
          nmap -sV -O -Pn -iL "$DISC" -oA "$OUTDIR/nmap_results" || true
          echo "Nmap finished. Results in $OUTDIR/nmap_results.*"
          echo "nmap_results=${OUTDIR}/nmap_results.xml" >> "${GITHUB_OUTPUT}"

      - name: Advanced tests + scoring (ping, tcp rtt, tls, health, throughput, stability)
        id: advanced
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          DISC="${{ steps.discover.outputs.discovered_file }}"
          METRICS_FILE="${TMPDIR}/${{ env.METRICS_OUTPUT }}"
          SCORE_RAW="${TMPDIR}/score_raw.txt"
          : > "$METRICS_FILE"
          : > "$SCORE_RAW"

          # helper functions
          retry_with_backoff() {
            local host="$1"; local port="$2"
            local max_retries=5; local delay=2; local retries=0
            while [ $retries -lt $max_retries ]; do
              if timeout 1 bash -c "cat < /dev/tcp/${host}/${port} >/dev/null 2>&1"; then
                return 0
              fi
              retries=$((retries+1))
              sleep $delay
              delay=$((delay*2))
            done
            return 1
          }

          measure_tcp_rtt() {
            host="$1"; port="$2"; attempts="$3"
            best=9999
            for i in $(seq 1 "$attempts"); do
              if retry_with_backoff "$host" "$port"; then
                start=$(date +%s%3N)
                timeout 2 bash -c "exec 3<>/dev/tcp/${host}/${port}" >/dev/null 2>&1 || true
                end=$(date +%s%3N)
                rtt=$((end-start))
                if [ "$rtt" -lt "$best" ]; then best=$rtt; fi
              fi
            done
            echo "$best"
          }

          measure_tls() {
            host="$1"; port="$2"; tout="$3"
            start=$(date +%s%3N)
            if timeout "${tout}s" bash -c "echo | openssl s_client -connect ${host}:${port} -servername ${host} >/dev/null 2>&1"; then
              end=$(date +%s%3N)
              echo $((end-start))
            else
              echo 9999
            fi
          }

          measure_health() {
            proto="$1"; host="$2"; path="$3"; tout="$4"
            out=$(timeout "${tout}s" curl --max-time "${tout}" --insecure -sS -w "%{http_code},%{time_total}" -o /dev/null "${proto}://${host}${path}" 2>/dev/null) || out=""
            if [ -z "$out" ]; then
              printf "0,9999,000"
              return 0
            fi
            http_code=$(echo "$out" | cut -d',' -f1)
            time_total=$(echo "$out" | cut -d',' -f2)
            ms=$(awk -v t="$time_total" 'BEGIN{printf("%d", t*1000)}')
            health_ok=0
            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 400 ]; then health_ok=1; fi
            printf "%d,%s,%03d" "$health_ok" "$ms" "$http_code"
          }

          measure_single_throughput() {
            proto="$1"; host="$2"; url="$3"; bytes="$4"; tout="$5"
            out=$(timeout "${tout}s" curl --max-time "${tout}" \
              --proxy "${proto}://${host}" \
              --insecure -sS -w "%{time_total},%{size_download}" \
              -o /dev/null \
              "${url}?bytes=${bytes}" 2>/dev/null) || out=""
            if [ -z "$out" ]; then echo 0; return 0; fi
            time_total=$(echo "$out" | cut -d',' -f1)
            size_download=$(echo "$out" | cut -d',' -f2)
            if awk "BEGIN{exit !($time_total>0 && $size_download==${THROUGHPUT_TEST_BYTES})}"; then
              bps=$(awk -v b="$size_download" -v t="$time_total" 'BEGIN{printf("%d", (b*8)/t)}')
              echo "$bps"
            else
              echo 0
            fi
          }

          measure_stability() {
            host="$1"; pings="$2"; proto="$3"; path="$4"; tout="$5"
            succ_ping=0
            for i in $(seq 1 "$pings"); do
              if timeout 2 ping -c 1 -W 1 "$host" >/dev/null 2>&1; then succ_ping=$((succ_ping+1)); fi
            done
            ping_ratio=$(awk -v s="$succ_ping" -v t="$pings" 'BEGIN{printf("%.2f", (t>0)?s/t:0)}')
            succ_http=0
            for i in $(seq 1 "$pings"); do
              if timeout "${tout}s" curl --max-time "${tout}" --insecure -sS -o /dev/null -w "%{http_code}" "${proto}://${host}${path}" 2>/dev/null | awk '{exit ($1>=200 && $1<400)?0:1}'; then
                succ_http=$((succ_http+1))
              fi
            done
            http_ratio=$(awk -v s="$succ_http" -v t="$pings" 'BEGIN{printf("%.2f", (t>0)?s/t:0)}')
            printf "%s,%s" "$ping_ratio" "$http_ratio"
          }

          # read discovered IPs
          if [ ! -s "${DISC}" ]; then
            echo "No discovered IPs — exiting advanced tests."
            exit 0
          fi

          while read -r ip; do
            IP_CLEAN="${ip}"
            LAT=9999

            # geo
            GEO_RAW=$(geoiplookup "$IP_CLEAN" 2>/dev/null || echo "")
            GEO=$(echo "$GEO_RAW" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            [ -z "$GEO" ] && GEO="XX"

            # 1) real ping
            REAL_PING=9999
            if ping -c "${REAL_PING_TESTS}" -W 1 "$IP_CLEAN" >/tmp/pinglog 2>/dev/null; then
              AVG=$(awk -F'/' '/rtt/ {print $5} END{if(NR==0) print ""}' /tmp/pinglog || echo "")
              if [ -n "$AVG" ]; then REAL_PING=$(printf "%.0f" "$AVG" 2>/dev/null || echo 9999); fi
            fi

            # 2) TCP RTT
            TCP_RTT=9999
            if [ "${TCP_CONNECT_TESTS}" -gt 0 ]; then TCP_RTT=$(measure_tcp_rtt "$IP_CLEAN" "${TCP_TEST_PORT}" "${TCP_CONNECT_TESTS}" || echo 9999); fi

            # 3) TLS handshake
            TLS_MS=9999
            TLS_MS=$(measure_tls "$IP_CLEAN" "${TLS_TEST_PORT}" "${TLS_TIMEOUT}" || echo 9999)

            # 4) health (https)
            HTTP_PROTO="https"
            HEALTH_RES=$(measure_health "$HTTP_PROTO" "$IP_CLEAN" "${HEALTH_URL_PATH}" "${HEALTH_HTTP_TIMEOUT}" || echo "0,9999,000")
            HEALTH_OK=$(echo "$HEALTH_RES" | cut -d',' -f1)
            HEALTH_LAT_MS=$(echo "$HEALTH_RES" | cut -d',' -f2)
            HEALTH_STATUS_CODE=$(echo "$HEALTH_RES" | cut -d',' -f3)

            # 5) throughput (if health ok)
            THROUGHPUT_BPS=0
            if [ "$HEALTH_OK" -eq 1 ]; then
              RAW_BPS_RESULTS="${TMPDIR}/bps_${IP_CLEAN}.txt"
              : > "$RAW_BPS_RESULTS"
              for i in $(seq 1 "${THROUGHPUT_TEST_COUNT}"); do
                bps_run=$(measure_single_throughput "$HTTP_PROTO" "$IP_CLEAN" "${THROUGHPUT_TEST_URL}" "${THROUGHPUT_TEST_BYTES}" "${THROUGHPUT_TIMEOUT}")
                echo "$bps_run" >> "$RAW_BPS_RESULTS"
              done
              # median
              MEDIAN_BPS=$(sort -n "$RAW_BPS_RESULTS" | awk '{a[NR]=$1} END{ if (NR==0) print 0; else if (NR%2==1) print a[int(NR/2)+1]; else print int((a[NR/2]+a[NR/2+1])/2)}')
              THROUGHPUT_BPS=$(printf "%.0f" "$MEDIAN_BPS" 2>/dev/null || echo 0)
            fi

            # 6) stability
            STAB=$(measure_stability "$IP_CLEAN" 3 "$HTTP_PROTO" "${HEALTH_URL_PATH}" "${HEALTH_HTTP_TIMEOUT}" || echo "0,0")
            PING_RATIO=$(echo "$STAB" | cut -d',' -f1)
            HTTP_RATIO=$(echo "$STAB" | cut -d',' -f2)

            # score calculation
            RAW_SCORE=$(awk -v w_lat="${W_SCANNER_LATENCY}" -v lat="$LAT" \
                          -v w_rp="${W_REAL_PING}" -v rp="$REAL_PING" \
                          -v w_tcp="${W_TCP_RTT}" -v tcp="$TCP_RTT" \
                          -v w_thr="${W_THROUGHPUT}" -v thr="$THROUGHPUT_BPS" \
                          -v w_tls="${W_TLS_HANDSHAKE}" -v tls="$TLS_MS" \
                          -v w_health="${W_HEALTH}" -v health_ok="$HEALTH_OK" -v health_lat="$HEALTH_LAT_MS" \
                          -v w_stab="${W_STABILITY}" -v ping_ratio="$PING_RATIO" -v http_ratio="$HTTP_RATIO" \
                          'BEGIN{
                             s_lat = (lat>0 ? 1000/(lat+1) : 0);
                             s_rp  = (rp>0 ? 1000/(rp+1) : 0);
                             s_tcp = (tcp<9999 && tcp>0 ? 1000/(tcp+1) : 0);
                             s_thr = (thr>0 ? thr/1024.0 : 0);
                             s_tls = (tls<9999 && tls>0 ? 1000/(tls+1) : 0);
                             s_health = (health_ok==1 ? (1000/(health_lat+1)) : 0);
                             s_stab = ( (ping_ratio + http_ratio) / 2.0 );
                             raw = (w_lat*s_lat) + (w_rp*s_rp) + (w_tcp*s_tcp) + (w_thr*s_thr) + (w_tls*s_tls) + (w_health*s_health) + (w_stab*s_stab);
                             printf("%.6f", raw);
                          }')

            # save
            echo "${RAW_SCORE} ${LAT} ${REAL_PING} ${TCP_RTT} ${THROUGHPUT_BPS} ${TLS_MS} ${HEALTH_OK} ${HEALTH_LAT_MS} ${HEALTH_STATUS_CODE} ${PING_RATIO} ${HTTP_RATIO} ${GEO} ${IP_CLEAN}" >> "$SCORE_RAW"

            jq -nc --arg ip "$IP_CLEAN" --arg geo "$GEO" \
              --argjson lat "$LAT" --argjson realping "$REAL_PING" --argjson tcp "$TCP_RTT" \
              --argjson throughput "$THROUGHPUT_BPS" --argjson tls "$TLS_MS" \
              --argjson health_ok "$HEALTH_OK" --argjson health_lat "$HEALTH_LAT_MS" \
              --argjson health_status "$HEALTH_STATUS_CODE" --argjson ping_ratio "$PING_RATIO" --argjson http_ratio "$HTTP_RATIO" \
              --argjson raw "$RAW_SCORE" \
              '{ip:$ip,geo:$geo,latency:$lat,realping:$realping,tcp_rtt:$tcp,throughput_bps:$throughput,tls_ms:$tls,health_ok:$health_ok,health_latency_ms:$health_lat,health_status:$health_status,ping_ratio:$ping_ratio,http_ratio:$http_ratio,raw_score:$raw}' \
              >> "$METRICS_FILE"

            if [ "${DEBUG}" = "true" ]; then
              echo "DEBUG: metrics for $IP_CLEAN -> raw=$RAW_SCORE"
            fi

          done < "${DISC}"

          # persist results
          mkdir -p "${GITHUB_WORKSPACE}/scan_results"
          cp "$METRICS_FILE" "${GITHUB_WORKSPACE}/scan_results/$(basename "$METRICS_FILE")" || true
          cp "$SCORE_RAW" "${GITHUB_WORKSPACE}/scan_results/$(basename "$SCORE_RAW")" || true

          # produce top-5 summary
          if command -v jq >/dev/null 2>&1 && [ -s "$METRICS_FILE" ]; then
            jq -s 'sort_by(-.raw_score) | .[0:5]' "$METRICS_FILE" > "${GITHUB_WORKSPACE}/${{ env.SUMMARY_OUTPUT }}" || true
            echo "Summary saved to ${SUMMARY_OUTPUT}"
          fi

          echo "Advanced tests and scoring done."

      - name: Save best IP to Cloudflare D1
        if: always()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DB_NAME: ${{ secrets.D1_DB_NAME }}
        run: |
          set -euo pipefail

          SUMMARY_FILE="${GITHUB_WORKSPACE}/${{ env.SUMMARY_OUTPUT }}"

          if [ ! -s "$SUMMARY_FILE" ]; then
            echo "No summary file found — skipping D1 insert."
            exit 0
          fi

          BEST_IP=$(jq -r '.[0].ip // empty' "$SUMMARY_FILE")
          BEST_SCORE=$(jq -r '.[0].raw_score // 0' "$SUMMARY_FILE")
          BEST_GEO=$(jq -r '.[0].geo // "XX"' "$SUMMARY_FILE")
          BEST_PING=$(jq -r '.[0].realping // 9999' "$SUMMARY_FILE")
          BEST_THR=$(jq -r '.[0].throughput_bps // 0' "$SUMMARY_FILE")

          if [ -z "$BEST_IP" ] || [ "$BEST_IP" = "null" ]; then
            echo "No best IP found in summary — skipping D1 insert."
            exit 0
          fi

          echo "🌐 Best IP found: $BEST_IP (Score: $BEST_SCORE)"

          # Create properly escaped SQL file for insert
          # Use printf to properly escape single quotes in values
          ESCAPED_IP=$(echo "$BEST_IP" | sed "s/'/''/g")
          ESCAPED_GEO=$(echo "$BEST_GEO" | sed "s/'/''/g")

          cat > insert_best_ip.sql <<EOF
          INSERT INTO proxy_updates (ip, score, geo, latency, throughput, updated_at)
          VALUES ('${ESCAPED_IP}', ${BEST_SCORE}, '${ESCAPED_GEO}', ${BEST_PING}, ${BEST_THR}, CURRENT_TIMESTAMP);
          EOF

          echo "Generated SQL:"
          cat insert_best_ip.sql

          # install wrangler (if not present) and execute SQL against D1
          if ! command -v wrangler &>/dev/null; then
            echo "Installing wrangler..."
            npm install -g wrangler@3 || {
              echo "Failed to install wrangler globally, trying local install..."
              npm install wrangler@3
              export PATH="$PATH:$(pwd)/node_modules/.bin"
            }
          fi

          # Verify wrangler is available
          if ! command -v wrangler &>/dev/null; then
            echo "ERROR: wrangler installation failed. Cannot proceed with D1 insert."
            exit 1
          fi

          # Export token for wrangler to use
          export CF_API_TOKEN="${CF_API_TOKEN}"

          echo "Executing SQL against D1 database: ${D1_DB_NAME} (account: ${CF_ACCOUNT_ID})"
          
          # Execute with proper error handling
          if wrangler d1 execute "${D1_DB_NAME}" \
            --account-id="${CF_ACCOUNT_ID}" \
            --file=insert_best_ip.sql 2>&1 | tee d1_output.log; then
            echo "✅ Best IP inserted into D1 successfully."
          else
            echo "⚠️ D1 insert failed. Check the output above for details."
            cat d1_output.log || true
            exit 1
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan_results
          path: |
            scan_results/
            *.log
            *.sql

  cleanup-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    needs: smartping
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
