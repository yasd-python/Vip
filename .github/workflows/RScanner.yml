name: Rust Proxy Scanner - SmartPing Adaptive AI (D1 only) - FINAL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

concurrency:
  group: rust-proxy-smartping-d1-final
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  # Core scanner
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan.log
  SCANNER_TIMEOUT: "600"        # seconds
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  REAL_PING_TESTS: "3"

  # D1 update retry policy
  MAX_D1_RETRIES: "5"
  D1_RETRY_SLEEP: "2"

  # TCP test
  TCP_CONNECT_TESTS: "1"
  TCP_TEST_PORT: "80"

  # HTTP / throughput / TLS
  HEALTH_URL_PATH: "/favicon.ico"
  HEALTH_HTTP_TIMEOUT: "5"
  THROUGHPUT_MAX_BYTES: "200000"
  TLS_TEST_PORT: "443"
  TLS_TIMEOUT: "5"

  # Scoring weights (sensible defaults; adjust if you want a different policy)
  W_SCANNER_LATENCY: "0.18"
  W_REAL_PING: "0.22"
  W_TCP_RTT: "0.05"
  W_THROUGHPUT: "0.25"
  W_TLS_HANDSHAKE: "0.10"
  W_HEALTH: "0.10"
  W_STABILITY: "0.05"
  W_COST: "0.00"         # default neutral; set >0 and provide cost metadata if you want cost weighting
  W_GEO_BONUS: "200"

  # Behavior flags
  DRY_RUN: "false"       # when "true" skip writing to D1
  DEBUG: "false"         # when "true" emits verbose logs

  # Output files
  METRICS_OUTPUT: "metrics.json"
  SUMMARY_OUTPUT: "scan_summary.json"

jobs:
  smartping:
    name: Build → Scan → Advanced Tests → Score → Update Cloudflare D1
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq curl geoip-bin build-essential pkg-config libssl-dev ca-certificates coreutils iputils-ping netcat-openbsd openssl
          if ! command -v geoiplookup &>/dev/null; then
            echo "❌ geoiplookup not found after install!"
            exit 1
          fi
          echo "✅ System dependencies installed"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts and registry
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-cache-final-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-cache-final-${{ runner.os }}-

      - name: Build Rust scanner (release)
        run: |
          set -euo pipefail
          echo "=> cargo build --release"
          if ! cargo build --release 2>&1 | tee build-output.log; then
            echo "❌ Cargo build failed. Showing last 200 lines:"
            tail -n 200 build-output.log || true
            exit 1
          fi
          ls -lah target/release/ || true
          if [ ! -f "${{ env.SCAN_BINARY }}" ]; then
            echo "❌ Scanner binary not found at ${{ env.SCAN_BINARY }}"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Run scanner & perform advanced tests + scoring
        id: scan
        timeout-minutes: 40
        run: |
          set -euo pipefail
          shopt -s nocasematch || true

          # --- envs ---
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          LOCS="${{ env.PRIORITY_LOCATIONS }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          REAL_PING_TESTS="${{ env.REAL_PING_TESTS }}"
          TCP_TESTS="${{ env.TCP_CONNECT_TESTS }}"
          TCP_PORT="${{ env.TCP_TEST_PORT }}"
          HEALTH_PATH="${{ env.HEALTH_URL_PATH }}"
          HEALTH_TIMEOUT="${{ env.HEALTH_HTTP_TIMEOUT }}"
          THROUGHPUT_BYTES="${{ env.THROUGHPUT_MAX_BYTES }}"
          TLS_PORT="${{ env.TLS_TEST_PORT }}"
          TLS_TIMEOUT="${{ env.TLS_TIMEOUT }}"

          # weights
          W_SCANNER_LATENCY="${{ env.W_SCANNER_LATENCY }}"
          W_REAL_PING="${{ env.W_REAL_PING }}"
          W_TCP_RTT="${{ env.W_TCP_RTT }}"
          W_THROUGHPUT="${{ env.W_THROUGHPUT }}"
          W_TLS_HANDSHAKE="${{ env.W_TLS_HANDSHAKE }}"
          W_HEALTH="${{ env.W_HEALTH }}"
          W_STABILITY="${{ env.W_STABILITY }}"
          W_COST="${{ env.W_COST }}"
          W_GEO_BONUS="${{ env.W_GEO_BONUS }}"

          DRY_RUN="${{ env.DRY_RUN }}"
          DEBUG="${{ env.DEBUG }}"
          METRICS="${{ env.METRICS_OUTPUT }}"
          SUMMARY="${{ env.SUMMARY_OUTPUT }}"

          : > "$LOG"
          if [ ! -x "$BIN" ]; then chmod +x "$BIN" || true; fi

          echo "=> Running scanner with timeout ${TIMEOUT}s"
          timeout "${TIMEOUT}s" "$BIN" > "$LOG" 2>&1 || true
          echo "=> Scanner finished (or timed out). Log saved to $LOG"

          # Parse PROXY LIVE lines (support IPv4 & IPv6)
          awk 'BEGIN{IGNORECASE=1}
            /PROXY[[:space:]]+LIVE/ {
              ip="";
              if (match($0, /([0-9a-fA-F:]+)/, ip6)) { ip=ip6[1]; gsub(/^|$/,"",ip) }
              else if (match($0, /([0-9]{1,3}(\.[0-9]{1,3}){3})/, ip4)) { ip=ip4[1] }
              lat="9999";
              if (match($0, /([[:space:]]*([0-9]+)[[:space:]]*m?s)[[:space:]]*/, a)) { lat=a[2] }
              else if (match($0, /([0-9]+)[[:space:]]*m?s/, b)) { lat=b[1] }
              gsub(/[^0-9]/,"",lat)
              if (lat+0 <= 0) lat = 9999
              if (ip != "") print lat+0, ip
            }' "$LOG" > "$TMPDIR/proxies.txt" || true

          TOTAL=$(wc -l < "$TMPDIR/proxies.txt" 2>/dev/null || echo 0)
          echo "=> Found $TOTAL candidate proxies"

          if [ "$TOTAL" -eq 0 ]; then
            echo "bestip=" >> "$GITHUB_OUTPUT"; echo "location=" >> "$GITHUB_OUTPUT"; echo "latency=" >> "$GITHUB_OUTPUT";
            echo "realping=" >> "$GITHUB_OUTPUT"; echo "score=" >> "$GITHUB_OUTPUT"; echo "total_proxies=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SCORE_RAW="$TMPDIR/scores_raw.txt"; : > "$SCORE_RAW"
          : > "$TMPDIR/$METRICS"

          # helper funcs
          measure_tls() {
            host="$1"; port="$2"; timeout_s="$3"
            start=$(date +%s%3N)
            if timeout "$timeout_s" openssl s_client -connect "${host}:${port}" -servername "${host}" </dev/null >/dev/null 2>&1; then
              end=$(date +%s%3N); echo $((end-start))
            else
              echo 9999
            fi
          }

          measure_http_and_throughput() {
            proto="$1"; host="$2"; path="$3"; timeout_s="$4"; max_bytes="$5"
            url="${proto}://${host}${path}"
            start=$(date +%s%3N)
            status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$timeout_s" "$url" || echo "000")
            end=$(date +%s%3N)
            elapsed=$((end-start))
            health_ok=0
            if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 400 ]; then health_ok=1; fi
            speed=$(curl -s --max-time "$timeout_s" -r 0-$((max_bytes-1)) -w "%{speed_download}" -o /dev/null "$url" || echo 0)
            speed_int=$(printf "%.0f" "$speed" 2>/dev/null || echo 0)
            echo "${health_ok},${elapsed},${speed_int},${status_code}"
          }

          measure_tcp_rtt() {
            host="$1"; port="$2"; attempts="$3"
            best=9999
            for i in $(seq 1 $attempts); do
              start=$(date +%s%3N)
              if timeout 1 bash -c "cat < /dev/tcp/${host}/${port} >/dev/null 2>&1"; then
                end=$(date +%s%3N)
                rtt=$((end-start))
                if [ "$rtt" -lt "$best" ]; then best=$rtt; fi
              fi
            done
            echo "$best"
          }

          measure_stability() {
            host="$1"; ping_count="$2"; proto="$3"; path="$4"; http_timeout="$5"
            ok_ping=0; ok_http=0
            for i in $(seq 1 $ping_count); do
              if ping -c 1 -W 1 "$host" >/dev/null 2>&1; then ok_ping=$((ok_ping+1)); fi
              status=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$http_timeout" "${proto}://${host}${path}" || echo "000")
              if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then ok_http=$((ok_http+1)); fi
            done
            ping_ratio=$(( (ok_ping * 100) / (ping_count > 0 ? ping_count : 1) ))
            http_ratio=$(( (ok_http * 100) / (ping_count > 0 ? ping_count : 1) ))
            echo "${ping_ratio},${http_ratio}"
          }

          # iterate candidates
          while read -r lat ip; do
            IP_CLEAN="$ip"
            LAT=${lat//[^0-9]/}; [ -z "$LAT" ] && LAT=9999

            GEO_RAW=$(geoiplookup "$IP_CLEAN" 2>/dev/null || echo "")
            GEO=$(echo "$GEO_RAW" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            [ -z "$GEO" ] && GEO="XX"

            # real ping
            REAL_PING=9999
            if ping -c ${REAL_PING_TESTS} -W 1 "$IP_CLEAN" >/tmp/pinglog 2>/dev/null; then
              AVG=$(awk -F'/' '/rtt/ {print $5} END{if(NR==0) print ""}' /tmp/pinglog || true)
              if [ -n "$AVG" ]; then REAL_PING=$(printf "%.0f" "$AVG" 2>/dev/null || echo 9999); fi
            fi

            # tcp rtt
            TCP_RTT=9999
            if [ "$TCP_TESTS" -gt 0 ]; then TCP_RTT=$(measure_tcp_rtt "$IP_CLEAN" "$TCP_PORT" "$TCP_TESTS" || echo 9999); fi

            # TLS handshake
            TLS_MS=9999
            TLS_MS=$(measure_tls "$IP_CLEAN" "$TLS_PORT" "$TLS_TIMEOUT" || echo 9999)

            # HTTP health & throughput (try https then http)
            HTTP_PROTO="https"
            HEALTH_RES=$(measure_http_and_throughput "$HTTP_PROTO" "$IP_CLEAN" "$HEALTH_PATH" "$HEALTH_TIMEOUT" "$THROUGHPUT_BYTES" || echo "0,9999,0,000")
            HEALTH_OK=$(echo "$HEALTH_RES" | cut -d',' -f1)
            if [ "$HEALTH_OK" -eq 0 ]; then
              HTTP_PROTO="http"
              HEALTH_RES=$(measure_http_and_throughput "$HTTP_PROTO" "$IP_CLEAN" "$HEALTH_PATH" "$HEALTH_TIMEOUT" "$THROUGHPUT_BYTES" || echo "0,9999,0,000")
            fi
            HEALTH_OK=$(echo "$HEALTH_RES" | cut -d',' -f1)
            HEALTH_LAT_MS=$(echo "$HEALTH_RES" | cut -d',' -f2)
            THROUGHPUT_BPS=$(echo "$HEALTH_RES" | cut -d',' -f3)
            HEALTH_STATUS_CODE=$(echo "$HEALTH_RES" | cut -d',' -f4)

            # stability
            STAB=$(measure_stability "$IP_CLEAN" 3 "$HTTP_PROTO" "$HEALTH_PATH" "$HEALTH_TIMEOUT" || echo "0,0")
            PING_RATIO=$(echo "$STAB" | cut -d',' -f1)
            HTTP_RATIO=$(echo "$STAB" | cut -d',' -f2)

            # cost neutral
            COST_SCORE=0

            # geo bonus check
            GEO_BONUS=0
            if echo ",${LOCS}," | grep -E ",${GEO}," >/dev/null 2>&1; then GEO_BONUS=$W_GEO_BONUS; fi

            # compute raw score using AWK (floating math)
            RAW_SCORE=$(awk -v w_lat="$W_SCANNER_LATENCY" -v lat="$LAT" \
                          -v w_rp="$W_REAL_PING" -v rp="$REAL_PING" \
                          -v w_tcp="$W_TCP_RTT" -v tcp="$TCP_RTT" \
                          -v w_thr="$W_THROUGHPUT" -v thr="$THROUGHPUT_BPS" \
                          -v w_tls="$W_TLS_HANDSHAKE" -v tls="$TLS_MS" \
                          -v w_health="$W_HEALTH" -v health_ok="$HEALTH_OK" -v health_lat="$HEALTH_LAT_MS" \
                          -v w_stab="$W_STABILITY" -v ping_ratio="$PING_RATIO" -v http_ratio="$HTTP_RATIO" \
                          -v w_cost="$W_COST" -v cost="$COST_SCORE" \
                          -v geo_bonus="$GEO_BONUS" \
                          'BEGIN{
                             s_lat = (lat>0 ? 1000/(lat+1) : 0);
                             s_rp  = (rp>0 ? 1000/(rp+1) : 0);
                             s_tcp = (tcp<9999 && tcp>0 ? 1000/(tcp+1) : 0);
                             s_thr = (thr>0 ? thr/1024.0 : 0);
                             s_tls = (tls<9999 && tls>0 ? 1000/(tls+1) : 0);
                             s_health = (health_ok==1 ? (1000/(health_lat+1)) : 0);
                             s_stab = ( (ping_ratio + http_ratio) / 2.0 );
                             s_cost = (cost>0 ? cost : 0);
                             raw = (w_lat*s_lat) + (w_rp*s_rp) + (w_tcp*s_tcp) + (w_thr*s_thr) + (w_tls*s_tls) + (w_health*s_health) + (w_stab*s_stab) + (w_cost*s_cost) + geo_bonus;
                             printf("%.6f", raw);
                          }')

            # store raw metrics
            echo "${RAW_SCORE} ${LAT} ${REAL_PING} ${TCP_RTT} ${THROUGHPUT_BPS} ${TLS_MS} ${HEALTH_OK} ${HEALTH_LAT_MS} ${HEALTH_STATUS_CODE} ${PING_RATIO} ${HTTP_RATIO} ${GEO} ${IP_CLEAN}" >> "$SCORE_RAW"

            # append json line
            jq -nc --arg ip "$IP_CLEAN" --arg geo "$GEO" \
              --argjson lat "$LAT" --argjson realping "$REAL_PING" --argjson tcp "$TCP_RTT" \
              --argjson throughput "$THROUGHPUT_BPS" --argjson tls "$TLS_MS" \
              --argjson health_ok "$HEALTH_OK" --argjson health_lat "$HEALTH_LAT_MS" \
              --argjson health_status "$HEALTH_STATUS_CODE" --argjson ping_ratio "$PING_RATIO" --argjson http_ratio "$HTTP_RATIO" \
              --argjson raw "$RAW_SCORE" \
              '{ip:$ip,geo:$geo,latency:$lat,realping:$realping,tcp_rtt:$tcp,throughput_bps:$throughput,tls_ms:$tls,health_ok:$health_ok,health_latency_ms:$health_lat,health_status:$health_status,ping_ratio:$ping_ratio,http_ratio:$http_ratio,raw_score:$raw}' \
              >> "$TMPDIR/$METRICS"

          done < "$TMPDIR/proxies.txt"

          # Normalize into 0-100 (best = 100)
          RAW_MIN=$(awk 'NR==1{min=$1} NR>1{if($1<min) min=$1} END{print min}' "$SCORE_RAW")
          RAW_MAX=$(awk 'NR==1{max
