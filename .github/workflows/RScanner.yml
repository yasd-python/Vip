name: Rust Proxy Scanner (Ultimate KV + Git)

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/RScanner.yml'

env:
  SCAN_BINARY: './proxy-scanner'
  SCAN_LOG: 'scan_results.log'
  CACHE_FILE: '.proxy_cache'
  SCANNER_TIMEOUT: 600  # 10 minutes timeout

jobs:
  scan-and-update:
    name: Scan Proxies and Update KV
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for git operations
    
    steps:
      # ========== Step 1: Checkout Repository ==========
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========== Step 2: Setup Dependencies ==========
      - name: Setup Dependencies
        run: |
          set -euo pipefail
          echo "📦 Installing required packages..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq wget
          echo "✅ Dependencies installed"

      # ========== Step 3: Prepare Scanner Binary ==========
      - name: Prepare Scanner Binary
        run: |
          set -euo pipefail
          echo "🔧 Preparing scanner binary..."
          
          # Check if binary exists in repository
          if [ -f "${{ env.SCAN_BINARY }}" ]; then
            echo "✅ Binary found in repository"
          else
            echo "❌ Scanner binary not found: ${{ env.SCAN_BINARY }}"
            echo "Please ensure the binary is committed to the repository"
            exit 1
          fi
          
          # Make binary executable
          chmod +x "${{ env.SCAN_BINARY }}"
          
          # Verify binary is executable
          if [ -x "${{ env.SCAN_BINARY }}" ]; then
            echo "✅ Binary ready: ${{ env.SCAN_BINARY }}"
          else
            echo "❌ Failed to make binary executable"
            exit 1
          fi

      # ========== Step 4: Run Scanner and Select Best IP ==========
      - name: Run Scanner and Select Best IP
        id: scan
        timeout-minutes: 15
        run: |
          set -euo pipefail
          echo "🔍 Starting proxy scanner..."
          
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          CACHE_FILE="${{ env.CACHE_FILE }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          
          # Create temporary directory for processing
          TMPDIR=$(mktemp -d)
          CANDIDATES="$TMPDIR/candidates.txt"
          SCAN_OUT="$TMPDIR/scan_out.log"
          
          # Cleanup function
          cleanup() {
            rm -rf "$TMPDIR" || true
          }
          trap cleanup EXIT
          
          # Run scanner with timeout protection
          set +e
          echo "⏱️  Running scanner (timeout: ${TIMEOUT}s)..."
          timeout "${TIMEOUT}s" "$BIN" > "$SCAN_OUT" 2>&1
          SCANNER_EXIT_CODE=$?
          set -e
          
          # Interpret scanner exit code
          if [ "$SCANNER_EXIT_CODE" -eq 0 ]; then
            echo "✅ Scanner completed successfully"
          elif [ "$SCANNER_EXIT_CODE" -eq 124 ]; then
            echo "⚠️  Scanner timed out (will use partial results)"
          else
            echo "⚠️  Scanner exited with code ${SCANNER_EXIT_CODE} (attempting to parse results)"
          fi
          
          # Save complete scanner output to log file
          cp "$SCAN_OUT" "$LOG" || true
          
          # Parse scanner results to find live proxies
          echo "📊 Parsing scan results..."
          
          # Extract all live proxies with their ping times
          # Expected format: "PROXY LIVE: 1.2.3.4 (50 ms)"
          grep -E "PROXY LIVE.*\([0-9]+ ms\)" "$SCAN_OUT" | \
            grep -oE "[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+.*\([0-9]+ ms\)" > "$CANDIDATES" || true
          
          # Initialize variables
          TOTAL_COUNT=0
          BEST_IP=""
          BEST_PING=""
          
          # Check if we found any live proxies
          if [ ! -s "$CANDIDATES" ]; then
            echo "❌ No live proxies found in scan results!"
            
            # Try to use cached IP from previous successful run
            if [ -f "$CACHE_FILE" ] && [ -s "$CACHE_FILE" ]; then
              echo "📦 Using cached IP from previous run"
              BEST_IP=$(cat "$CACHE_FILE")
              BEST_PING="cached"
              TOTAL_COUNT=0
            else
              echo "❌ No cached IP available"
              echo "Cannot proceed without a valid proxy IP"
              exit 1
            fi
          else
            # Count total live proxies found
            TOTAL_COUNT=$(wc -l < "$CANDIDATES")
            echo "📈 Found ${TOTAL_COUNT} live proxies"
            
            # Extract IP addresses and ping times, then sort by ping (lowest first)
            awk '{
              match($0, /([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+).*\(([0-9]+) ms\)/, arr)
              if (arr[1] && arr[2]) {
                print arr[2] " " arr[1]
              }
            }' "$CANDIDATES" | sort -n | head -1 > "$TMPDIR/best.txt"
            
            # Read the best proxy (lowest ping)
            if [ -s "$TMPDIR/best.txt" ]; then
              read BEST_PING BEST_IP < "$TMPDIR/best.txt"
              echo "🏆 Best IP selected: $BEST_IP (ping: ${BEST_PING}ms)"
              
              # Cache the best IP for future use
              echo "$BEST_IP" > "$CACHE_FILE"
              echo "💾 IP cached to: $CACHE_FILE"
            else
              echo "❌ Failed to parse best IP from results"
              exit 1
            fi
          fi
          
          # Validate IP address format
          if ! echo "$BEST_IP" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid IP address format: $BEST_IP"
            exit 1
          fi
          
          # Set outputs for next steps
          echo "bestip=$BEST_IP" >> "$GITHUB_OUTPUT"
          echo "bestping=$BEST_PING" >> "$GITHUB_OUTPUT"
          echo "total_proxies=$TOTAL_COUNT" >> "$GITHUB_OUTPUT"
          
          echo "✅ Scan completed successfully"
          echo "   Best IP: $BEST_IP"
          echo "   Ping: ${BEST_PING}ms"
          echo "   Total proxies: $TOTAL_COUNT"

      # ========== Step 5: Update Cloudflare KV ==========
      - name: Update Cloudflare KV with Best IP
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_KV_KEY: ${{ secrets.CF_KV_KEY || 'PROXYIP' }}
        run: |
          set -euo pipefail
          
          # Get outputs from scan step
          BEST_IP="${{ steps.scan.outputs.bestip }}"
          BEST_PING="${{ steps.scan.outputs.bestping }}"
          TOTAL="${{ steps.scan.outputs.total_proxies }}"
          
          # Validate we have an IP to update
          if [ -z "$BEST_IP" ]; then
            echo "❌ No IP address to update in Cloudflare KV"
            exit 1
          fi
          
          # Validate required Cloudflare credentials
          if [ -z "$CF_ACCOUNT_ID" ] || [ -z "$CF_API_TOKEN" ] || [ -z "$CF_NAMESPACE_ID" ]; then
            echo "❌ Missing required Cloudflare credentials"
            echo "Please ensure CF_ACCOUNT_ID, CF_API_TOKEN, and CF_NAMESPACE_ID secrets are set"
            exit 1
          fi
          
          echo "🔐 Updating Cloudflare KV..."
          echo "   Account ID: ${CF_ACCOUNT_ID:0:8}..."
          echo "   Namespace ID: ${CF_NAMESPACE_ID:0:8}..."
          echo "   Key: $CF_KV_KEY"
          echo "   Value: $BEST_IP (${BEST_PING}ms, ${TOTAL} proxies scanned)"
          
          # Create metadata for the KV entry
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          METADATA=$(jq -n \
            --arg ip "$BEST_IP" \
            --arg ping "$BEST_PING" \
            --arg total "$TOTAL" \
            --arg timestamp "$TIMESTAMP" \
            --arg workflow "${{ github.run_id }}" \
            '{
              ip: $ip,
              ping_ms: $ping,
              total_proxies: $total,
              updated_at: $timestamp,
              github_run_id: $workflow,
              source: "github-actions"
            }')
          
          echo "📝 Metadata: $METADATA"
          
          # Prepare the request payload
          PAYLOAD=$(jq -n \
            --arg key "$CF_KV_KEY" \
            --arg value "$BEST_IP" \
            --argjson metadata "$METADATA" \
            '[{
              key: $key,
              value: $value,
              metadata: $metadata
            }]')
          
          # Update Cloudflare KV using bulk write API
          RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_NAMESPACE_ID}/bulk" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          
          # Check if the API call was successful
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Cloudflare KV updated successfully"
            echo "   Key: $CF_KV_KEY = $BEST_IP"
          else
            echo "❌ Failed to update Cloudflare KV"
            echo "Response: $RESPONSE"
            
            # Extract error messages if available
            ERRORS=$(echo "$RESPONSE" | jq -r '.errors[]?.message // empty' 2>/dev/null || echo "Unknown error")
            if [ -n "$ERRORS" ]; then
              echo "Errors: $ERRORS"
            fi
            exit 1
          fi

      # ========== Step 6: Commit Results to Repository ==========
      - name: Commit Scan Results
        run: |
          set -euo pipefail
          
          echo "📝 Committing scan results to repository..."
          
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add files to git
          git add "${{ env.SCAN_LOG }}" "${{ env.CACHE_FILE }}" || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            # Commit with detailed message
            BEST_IP="${{ steps.scan.outputs.bestip }}"
            BEST_PING="${{ steps.scan.outputs.bestping }}"
            TOTAL="${{ steps.scan.outputs.total_proxies }}"
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            git commit -m "🤖 Auto-update: Best proxy IP" \
                       -m "IP: $BEST_IP" \
                       -m "Ping: ${BEST_PING}ms" \
                       -m "Total proxies: $TOTAL" \
                       -m "Updated: $TIMESTAMP" \
                       -m "Run: ${{ github.run_id }}"
            
            # Push changes
            git push
            echo "✅ Results committed and pushed to repository"
          fi

      # ========== Step 7: Create Summary ==========
      - name: Generate Job Summary
        if: always()
        run: |
          echo "# 🔍 Proxy Scanner Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "${{ steps.scan.outcome }}" = "success" ]; then
            BEST_IP="${{ steps.scan.outputs.bestip }}"
            BEST_PING="${{ steps.scan.outputs.bestping }}"
            TOTAL="${{ steps.scan.outputs.total_proxies }}"
            
            echo "## ✅ Scan Successful" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Best IP** | \`$BEST_IP\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Ping** | ${BEST_PING}ms |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total Proxies** | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Timestamp** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Scan Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The proxy scan did not complete successfully. Check the logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
