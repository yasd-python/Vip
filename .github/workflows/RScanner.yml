# .github/workflows/rust-proxy-smartping-final.yml
name: Rust Proxy Scanner - SmartPing Adaptive AI (D1 Integration) - FINAL

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Target IPs/CIDR (comma-separated, e.g., 198.51.100.0/24,203.0.113.5)'
        required: false
        type: string
      debug_mode:
        description: 'Enable debug output'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours

concurrency:
  group: rust-proxy-smartping-d1-final
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  # ============================================================================
  # CONFIGURATION SECTION - Modify these values before running
  # ============================================================================
  
  # Target Configuration
  # CRITICAL: Set your target IPs/CIDR ranges here
  # Example: "198.51.100.0/24,203.0.113.5,192.0.2.0/28"
  TARGETS: "${{ github.event.inputs.targets || '' }}"
  
  # Scanner Selection (enable/disable scanning tools)
  USE_MASSCAN: "true"          # Enable masscan for fast port scanning
  USE_ZMAP: "false"             # Enable zmap (requires elevated permissions and resources)
  USE_RSCANNER: "false"         # Enable custom RScanner (if available locally)
  SCAN_BINARY: ./target/release/RScanner
  
  # Core Scanner Settings
  SCANNER_TIMEOUT: "600"        # Maximum scan duration in seconds
  MASSCAN_RATE: "10000"         # Packets per second for masscan
  ZMAP_BANDWIDTH: "50M"         # Bandwidth limit for zmap
  
  # Geographic Priority Locations
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  
  # Testing Configuration
  REAL_PING_TESTS: "3"          # Number of ICMP ping tests per host
  TCP_CONNECT_TESTS: "2"        # Number of TCP connection attempts
  TCP_TEST_PORT: "443"          # Port for TCP RTT testing
  
  # Health Check Settings
  HEALTH_URL_PATH: "/favicon.ico"
  HEALTH_HTTP_TIMEOUT: "5"      # Timeout in seconds for HTTP health checks
  TLS_TEST_PORT: "443"
  TLS_TIMEOUT: "5"              # Timeout in seconds for TLS handshake
  
  # Throughput Testing
  THROUGHPUT_TEST_URL: "https://speed.cloudflare.com/__down"
  THROUGHPUT_TEST_BYTES: "10000000"  # 10 MB download test
  THROUGHPUT_TEST_COUNT: "3"    # Number of throughput measurements
  THROUGHPUT_TIMEOUT: "30"      # Timeout per throughput test
  
  # Scoring Weights (must sum to ~1.0 for normalized scoring)
  W_SCANNER_LATENCY: "0.18"     # Weight for initial scanner latency
  W_REAL_PING: "0.22"           # Weight for ICMP ping latency
  W_TCP_RTT: "0.05"             # Weight for TCP round-trip time
  W_THROUGHPUT: "0.25"          # Weight for bandwidth throughput
  W_TLS_HANDSHAKE: "0.10"       # Weight for TLS handshake speed
  W_HEALTH: "0.10"              # Weight for HTTP health check
  W_STABILITY: "0.05"           # Weight for connection stability
  W_GEO_BONUS: "200"            # Bonus points for priority locations
  
  # Behavior Flags
  DRY_RUN: "false"              # If true, simulate without actual scanning
  DEBUG: "${{ github.event.inputs.debug_mode || 'false' }}"
  
  # Output Files
  METRICS_OUTPUT: "metrics.ndjson"
  SUMMARY_OUTPUT: "scan_summary.json"
  MAX_RESULTS: "50"             # Maximum number of results to keep

jobs:
  smartping:
    name: Build → Discover → Scan → Test → Score → Save to D1
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ========================================================================
      # STEP 1: Repository Checkout
      # ========================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========================================================================
      # STEP 2: System Dependencies Installation
      # ========================================================================
      - name: Install system dependencies and scanning tools
        run: |
          set -euo pipefail
          
          echo "::group::Installing base system packages"
          sudo apt-get update -y
          sudo apt-get install -y \
            jq curl geoip-bin build-essential pkg-config \
            libssl-dev ca-certificates coreutils iputils-ping \
            netcat-openbsd openssl nmap git parallel \
            libpcap-dev libgcrypt20-dev
          echo "::endgroup::"
          
          # Install masscan if enabled
          if [ "${{ env.USE_MASSCAN }}" = "true" ]; then
            echo "::group::Installing masscan"
            if ! command -v masscan &>/dev/null; then
              git clone --depth 1 https://github.com/robertdavidgraham/masscan /tmp/masscan
              cd /tmp/masscan
              make -j$(nproc)
              sudo cp bin/masscan /usr/local/bin/
              masscan --version || echo "Warning: masscan installed but version check failed"
            else
              echo "masscan already installed"
            fi
            echo "::endgroup::"
          fi
          
          # Install zmap if enabled
          if [ "${{ env.USE_ZMAP }}" = "true" ]; then
            echo "::group::Installing zmap"
            if ! command -v zmap &>/dev/null; then
              git clone --depth 1 https://github.com/zmap/zmap /tmp/zmap
              cd /tmp/zmap
              mkdir -p build && cd build
              cmake .. && make -j$(nproc)
              sudo cp src/zmap /usr/local/bin/
              zmap --version || echo "Warning: zmap installed but version check failed"
            else
              echo "zmap already installed"
            fi
            echo "::endgroup::"
          fi
          
          # Install httpx (ProjectDiscovery) - optional but useful
          echo "::group::Installing httpx"
          if ! command -v httpx &>/dev/null; then
            GO111MODULE=on go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest 2>/dev/null || \
              echo "httpx installation failed (optional tool)"
          fi
          echo "::endgroup::"
          
          echo "✅ System and scanning tools installation complete"

      # ========================================================================
      # STEP 3: Rust Toolchain Setup (if RScanner is enabled)
      # ========================================================================
      - name: Install Rust toolchain
        if: env.USE_RSCANNER == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build RScanner
        if: env.USE_RSCANNER == 'true'
        run: |
          set -euo pipefail
          echo "::group::Building RScanner"
          cargo build --release --verbose
          ls -lah target/release/ || true
          if [ ! -x "${{ env.SCAN_BINARY }}" ]; then
            echo "::error::RScanner binary not found or not executable"
            exit 1
          fi
          echo "::endgroup::"

      # ========================================================================
      # STEP 4: Input Validation
      # ========================================================================
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail
          
          echo "::group::Input validation"
          
          # Check if at least one scanner is enabled
          if [ "${{ env.USE_MASSCAN }}" != "true" ] && \
             [ "${{ env.USE_ZMAP }}" != "true" ] && \
             [ "${{ env.USE_RSCANNER }}" != "true" ]; then
            echo "::error::No scanner enabled! Enable at least one scanner."
            exit 1
          fi
          
          # Validate targets are provided
          if [ -z "${{ env.TARGETS }}" ]; then
            echo "::warning::No targets specified. Workflow will run but produce no results."
            echo "has_targets=false" >> $GITHUB_OUTPUT
          else
            echo "has_targets=true" >> $GITHUB_OUTPUT
            echo "Targets configured: ${{ env.TARGETS }}"
          fi
          
          # Validate Cloudflare credentials
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] || \
             [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || \
             [ -z "${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}" ]; then
            echo "::warning::Cloudflare D1 credentials not configured. Results will not be saved to D1."
            echo "d1_enabled=false" >> $GITHUB_OUTPUT
          else
            echo "d1_enabled=true" >> $GITHUB_OUTPUT
            echo "✅ Cloudflare D1 integration enabled"
          fi
          
          # Validate scoring weights sum
          WEIGHT_SUM=$(awk -v w1="${{ env.W_SCANNER_LATENCY }}" \
                           -v w2="${{ env.W_REAL_PING }}" \
                           -v w3="${{ env.W_TCP_RTT }}" \
                           -v w4="${{ env.W_THROUGHPUT }}" \
                           -v w5="${{ env.W_TLS_HANDSHAKE }}" \
                           -v w6="${{ env.W_HEALTH }}" \
                           -v w7="${{ env.W_STABILITY }}" \
                           'BEGIN{print w1+w2+w3+w4+w5+w6+w7}')
          
          echo "Total scoring weight: $WEIGHT_SUM"
          if ! awk -v sum="$WEIGHT_SUM" 'BEGIN{exit !(sum >= 0.95 && sum <= 1.05)}'; then
            echo "::warning::Scoring weights sum to $WEIGHT_SUM (expected ~1.0)"
          fi
          
          echo "::endgroup::"

      # ========================================================================
      # STEP 5: Discovery Phase (Masscan/ZMap/RScanner)
      # ========================================================================
      - name: Discovery phase - scan for live hosts
        id: discover
        if: steps.validate.outputs.has_targets == 'true'
        run: |
          set -euo pipefail
          
          # Create working directories
          WORK_DIR="${RUNNER_TEMP}/scanner_work"
          mkdir -p "${WORK_DIR}"
          DISCOVERED_FILE="${WORK_DIR}/discovered.txt"
          : > "${DISCOVERED_FILE}"
          
          echo "::group::Discovery scanning"
          
          # Helper function to extract and deduplicate IPs
          extract_ips() {
            grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' | \
            awk '{
              split($0, octets, ".")
              if (octets[1]>=0 && octets[1]<=255 && 
                  octets[2]>=0 && octets[2]<=255 && 
                  octets[3]>=0 && octets[3]<=255 && 
                  octets[4]>=0 && octets[4]<=255)
                print $0
            }' | sort -u
          }
          
          # RScanner discovery
          if [ "${{ env.USE_RSCANNER }}" = "true" ] && [ -x "${{ env.SCAN_BINARY }}" ]; then
            echo "Running RScanner..."
            timeout ${{ env.SCANNER_TIMEOUT }}s "${{ env.SCAN_BINARY }}" \
              > "${WORK_DIR}/rscanner.log" 2>&1 || true
            cat "${WORK_DIR}/rscanner.log" | extract_ips >> "${DISCOVERED_FILE}" || true
          fi
          
          # Masscan discovery
          if [ "${{ env.USE_MASSCAN }}" = "true" ] && command -v masscan &>/dev/null; then
            if [ -n "${{ env.TARGETS }}" ]; then
              echo "Running masscan on targets: ${{ env.TARGETS }}"
              sudo masscan -p80,443,8080,8443 ${{ env.TARGETS }} \
                --rate ${{ env.MASSCAN_RATE }} \
                --wait 3 \
                --open-only \
                -oL "${WORK_DIR}/masscan.txt" 2>&1 || true
              
              if [ -f "${WORK_DIR}/masscan.txt" ]; then
                cat "${WORK_DIR}/masscan.txt" | extract_ips >> "${DISCOVERED_FILE}" || true
              fi
            fi
          fi
          
          # ZMap discovery (use with caution!)
          if [ "${{ env.USE_ZMAP }}" = "true" ] && command -v zmap &>/dev/null; then
            if [ -n "${{ env.TARGETS }}" ]; then
              echo "::warning::Running zmap - ensure you have proper authorization!"
              IFS=',' read -ra TARGET_ARRAY <<< "${{ env.TARGETS }}"
              for target in "${TARGET_ARRAY[@]}"; do
                target=$(echo "$target" | xargs) # trim whitespace
                echo "Scanning: $target"
                sudo zmap -p 443 "$target" \
                  -B ${{ env.ZMAP_BANDWIDTH }} \
                  -o "${WORK_DIR}/zmap_${target//\//_}.txt" 2>&1 || true
                
                if [ -f "${WORK_DIR}/zmap_${target//\//_}.txt" ]; then
                  cat "${WORK_DIR}/zmap_${target//\//_}.txt" | extract_ips >> "${DISCOVERED_FILE}" || true
                fi
              done
            fi
          fi
          
          # Deduplicate and validate discovered IPs
          sort -u "${DISCOVERED_FILE}" -o "${DISCOVERED_FILE}"
          DISCOVERED_COUNT=$(wc -l < "${DISCOVERED_FILE}")
          
          echo "::endgroup::"
          echo "📊 Discovered $DISCOVERED_COUNT unique IP addresses"
          
          if [ "${{ env.DEBUG }}" = "true" ]; then
            echo "::group::Discovered IPs"
            cat "${DISCOVERED_FILE}"
            echo "::endgroup::"
          fi
          
          # Save results
          mkdir -p "${GITHUB_WORKSPACE}/scan_results"
          cp "${DISCOVERED_FILE}" "${GITHUB_WORKSPACE}/scan_results/discovered.txt"
          
          echo "discovered_file=${GITHUB_WORKSPACE}/scan_results/discovered.txt" >> $GITHUB_OUTPUT
          echo "discovered_count=${DISCOVERED_COUNT}" >> $GITHUB_OUTPUT

      # ========================================================================
      # STEP 6: Nmap Service Detection
      # ========================================================================
      - name: Nmap service and version detection
        if: steps.discover.outputs.discovered_count > 0
        id: nmap
        run: |
          set -euo pipefail
          
          DISC_FILE="${{ steps.discover.outputs.discovered_file }}"
          OUT_DIR="${GITHUB_WORKSPACE}/scan_results"
          
          if [ ! -s "$DISC_FILE" ]; then
            echo "No discovered IPs for nmap scanning"
            exit 0
          fi
          
          echo "::group::Nmap scanning"
          echo "Running nmap service detection on $(wc -l < "$DISC_FILE") hosts..."
          
          nmap -sV -sC -T4 -Pn \
            --max-retries 2 \
            --host-timeout 5m \
            --open \
            -iL "$DISC_FILE" \
            -oA "$OUT_DIR/nmap_results" 2>&1 | tee "$OUT_DIR/nmap.log" || true
          
          echo "::endgroup::"
          echo "✅ Nmap scan complete"
          
          if [ -f "$OUT_DIR/nmap_results.xml" ]; then
            echo "nmap_xml=$OUT_DIR/nmap_results.xml" >> $GITHUB_OUTPUT
          fi

      # ========================================================================
      # STEP 7: Advanced Testing and Scoring
      # ========================================================================
      - name: Advanced tests and intelligent scoring
        if: steps.discover.outputs.discovered_count > 0
        id: advanced
        run: |
          set -euo pipefail
          
          WORK_DIR="${RUNNER_TEMP}/testing"
          mkdir -p "${WORK_DIR}"
          
          DISC_FILE="${{ steps.discover.outputs.discovered_file }}"
          METRICS_FILE="${WORK_DIR}/${{ env.METRICS_OUTPUT }}"
          SCORES_FILE="${WORK_DIR}/scores.txt"
          
          : > "$METRICS_FILE"
          : > "$SCORES_FILE"
          
          echo "::group::Advanced testing functions"
          
          # ====================================================================
          # Testing Functions
          # ====================================================================
          
          # TCP connection with retry and backoff
          retry_tcp_connect() {
            local host="$1"
            local port="$2"
            local max_attempts=5
            local delay=1
            
            for attempt in $(seq 1 $max_attempts); do
              if timeout 2 bash -c "exec 3<>/dev/tcp/${host}/${port} 2>/dev/null" 2>/dev/null; then
                return 0
              fi
              sleep $delay
              delay=$((delay * 2))
            done
            return 1
          }
          
          # Measure TCP RTT with multiple attempts
          measure_tcp_rtt() {
            local host="$1"
            local port="$2"
            local attempts="$3"
            local best_ms=9999
            
            for i in $(seq 1 "$attempts"); do
              if retry_tcp_connect "$host" "$port"; then
                local start=$(date +%s%3N)
                timeout 3 bash -c "exec 3<>/dev/tcp/${host}/${port}" 2>/dev/null || continue
                local end=$(date +%s%3N)
                local rtt=$((end - start))
                
                if [ "$rtt" -lt "$best_ms" ] && [ "$rtt" -gt 0 ]; then
                  best_ms=$rtt
                fi
              fi
            done
            
            echo "$best_ms"
          }
          
          # Measure TLS handshake time
          measure_tls_handshake() {
            local host="$1"
            local port="$2"
            local timeout_sec="$3"
            
            local start=$(date +%s%3N)
            if timeout "${timeout_sec}s" bash -c \
              "echo | openssl s_client -connect ${host}:${port} -servername ${host} 2>&1 | grep -q 'Verify return code'" \
              2>/dev/null; then
              local end=$(date +%s%3N)
              echo $((end - start))
            else
              echo 9999
            fi
          }
          
          # HTTP/HTTPS health check
          measure_health_check() {
            local proto="$1"
            local host="$2"
            local path="$3"
            local timeout_sec="$4"
            
            local result
            result=$(timeout "${timeout_sec}s" curl \
              --max-time "${timeout_sec}" \
              --connect-timeout 3 \
              --insecure \
              --silent \
              --show-error \
              --write-out "%{http_code},%{time_total}" \
              --output /dev/null \
              "${proto}://${host}${path}" 2>/dev/null) || result="000,9999"
            
            local http_code=$(echo "$result" | cut -d',' -f1)
            local time_sec=$(echo "$result" | cut -d',' -f2)
            local time_ms=$(awk -v t="$time_sec" 'BEGIN{printf("%d", t*1000)}')
            local is_healthy=0
            
            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 500 ]; then
              is_healthy=1
            fi
            
            printf "%d,%d,%s" "$is_healthy" "$time_ms" "$http_code"
          }
          
          # Throughput test
          measure_throughput() {
            local proto="$1"
            local host="$2"
            local url="$3"
            local bytes="$4"
            local timeout_sec="$5"
            
            local result
            result=$(timeout "${timeout_sec}s" curl \
              --max-time "${timeout_sec}" \
              --proxy "${proto}://${host}" \
              --insecure \
              --silent \
              --show-error \
              --write-out "%{time_total},%{size_download}" \
              --output /dev/null \
              "${url}?bytes=${bytes}" 2>/dev/null) || result="0,0"
            
            local time_sec=$(echo "$result" | cut -d',' -f1)
            local downloaded=$(echo "$result" | cut -d',' -f2)
            
            if awk "BEGIN{exit !($time_sec > 0 && $downloaded >= ${bytes}*0.9)}" 2>/dev/null; then
              awk -v b="$downloaded" -v t="$time_sec" 'BEGIN{printf("%d", (b*8)/t)}'
            else
              echo 0
            fi
          }
          
          # Connection stability test
          measure_stability() {
            local host="$1"
            local tests="$2"
            local proto="$3"
            local path="$4"
            local timeout_sec="$5"
            
            local ping_success=0
            local http_success=0
            
            # ICMP ping tests
            for i in $(seq 1 "$tests"); do
              if timeout 2 ping -c 1 -W 1 "$host" >/dev/null 2>&1; then
                ping_success=$((ping_success + 1))
              fi
            done
            
            # HTTP tests
            for i in $(seq 1 "$tests"); do
              local code
              code=$(timeout "${timeout_sec}s" curl \
                --max-time "${timeout_sec}" \
                --insecure \
                --silent \
                --output /dev/null \
                --write-out "%{http_code}" \
                "${proto}://${host}${path}" 2>/dev/null) || code="000"
              
              if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then
                http_success=$((http_success + 1))
              fi
            done
            
            local ping_ratio=$(awk -v s="$ping_success" -v t="$tests" 'BEGIN{printf("%.2f", s/t)}')
            local http_ratio=$(awk -v s="$http_success" -v t="$tests" 'BEGIN{printf("%.2f", s/t)}')
            
            printf "%s,%s" "$ping_ratio" "$http_ratio"
          }
          
          echo "::endgroup::"
          
          # ====================================================================
          # Main Testing Loop
          # ====================================================================
          
          echo "::group::Testing discovered hosts"
          
          TOTAL_IPS=$(wc -l < "$DISC_FILE")
          CURRENT=0
          
          while IFS= read -r ip; do
            CURRENT=$((CURRENT + 1))
            
            # Progress indicator
            if [ $((CURRENT % 10)) -eq 0 ] || [ "$CURRENT" -eq "$TOTAL_IPS" ]; then
              echo "Progress: $CURRENT/$TOTAL_IPS hosts tested"
            fi
            
            # Initialize metrics
            IP_CLEAN=$(echo "$ip" | xargs)
            SCANNER_LAT=9999
            
            # Geographic location
            GEO_DATA=$(geoiplookup "$IP_CLEAN" 2>/dev/null || echo "")
            GEO_CODE=$(echo "$GEO_DATA" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            [ -z "$GEO_CODE" ] && GEO_CODE="XX"
            
            # Real ICMP ping test
            REAL_PING_MS=9999
            if ping -c ${{ env.REAL_PING_TESTS }} -W 2 "$IP_CLEAN" > /tmp/ping_$$.log 2>&1; then
              PING_AVG=$(awk -F'/' '/^rtt/ {print $5}' /tmp/ping_$$.log 2>/dev/null || echo "")
              if [ -n "$PING_AVG" ]; then
                REAL_PING_MS=$(printf "%.0f" "$PING_AVG" 2>/dev/null || echo 9999)
              fi
            fi
            rm -f /tmp/ping_$$.log
            
            # TCP RTT test
            TCP_RTT_MS=9999
            if [ ${{ env.TCP_CONNECT_TESTS }} -gt 0 ]; then
              TCP_RTT_MS=$(measure_tcp_rtt "$IP_CLEAN" "${{ env.TCP_TEST_PORT }}" "${{ env.TCP_CONNECT_TESTS }}")
            fi
            
            # TLS handshake test
            TLS_MS=9999
            TLS_MS=$(measure_tls_handshake "$IP_CLEAN" "${{ env.TLS_TEST_PORT }}" "${{ env.TLS_TIMEOUT }}")
            
            # HTTP health check
            HEALTH_RESULT=$(measure_health_check "https" "$IP_CLEAN" "${{ env.HEALTH_URL_PATH }}" "${{ env.HEALTH_HTTP_TIMEOUT }}")
            HEALTH_OK=$(echo "$HEALTH_RESULT" | cut -d',' -f1)
            HEALTH_MS=$(echo "$HEALTH_RESULT" | cut -d',' -f2)
            HEALTH_CODE=$(echo "$HEALTH_RESULT" | cut -d',' -f3)
            
            # Throughput test (only if health check passed)
            THROUGHPUT_BPS=0
            if [ "$HEALTH_OK" -eq 1 ]; then
              THROUGHPUT_RESULTS="${WORK_DIR}/throughput_${IP_CLEAN}.txt"
              : > "$THROUGHPUT_RESULTS"
              
              for run in $(seq 1 ${{ env.THROUGHPUT_TEST_COUNT }}); do
                bps=$(measure_throughput "https" "$IP_CLEAN" \
                  "${{ env.THROUGHPUT_TEST_URL }}" \
                  "${{ env.THROUGHPUT_TEST_BYTES }}" \
                  "${{ env.THROUGHPUT_TIMEOUT }}")
                echo "$bps" >> "$THROUGHPUT_RESULTS"
              done
              
              # Calculate median throughput
              THROUGHPUT_BPS=$(sort -n "$THROUGHPUT_RESULTS" | \
                awk '{a[NR]=$1} END{
                  if(NR==0) print 0
                  else if(NR%2==1) print a[int(NR/2)+1]
                  else print int((a[NR/2]+a[NR/2+1])/2)
                }')
            fi
            
            # Stability test
            STABILITY_RESULT=$(measure_stability "$IP_CLEAN" 3 "https" \
              "${{ env.HEALTH_URL_PATH }}" "${{ env.HEALTH_HTTP_TIMEOUT }}")
            PING_STABILITY=$(echo "$STABILITY_RESULT" | cut -d',' -f1)
            HTTP_STABILITY=$(echo "$STABILITY_RESULT" | cut -d',' -f2)
            
            # ================================================================
            # Score Calculation
            # ================================================================
            
            RAW_SCORE=$(awk \
              -v w_lat="${{ env.W_SCANNER_LATENCY }}" -v lat="$SCANNER_LAT" \
              -v w_ping="${{ env.W_REAL_PING }}" -v ping="$REAL_PING_MS" \
              -v w_tcp="${{ env.W_TCP_RTT }}" -v tcp="$TCP_RTT_MS" \
              -v w_thr="${{ env.W_THROUGHPUT }}" -v thr="$THROUGHPUT_BPS" \
              -v w_tls="${{ env.W_TLS_HANDSHAKE }}" -v tls="$TLS_MS" \
              -v w_health="${{ env.W_HEALTH }}" -v h_ok="$HEALTH_OK" -v h_ms="$HEALTH_MS" \
              -v w_stab="${{ env.W_STABILITY }}" -v p_stab="$PING_STABILITY" -v h_stab="$HTTP_STABILITY" \
              'BEGIN{
                # Normalize latency metrics (lower is better)
                s_lat = (lat < 9999 && lat > 0) ? 1000.0 / (lat + 1) : 0
                s_ping = (ping < 9999 && ping > 0) ? 1000.0 / (ping + 1) : 0
                s_tcp = (tcp < 9999 && tcp > 0) ? 1000.0 / (tcp + 1) : 0
                s_tls = (tls < 9999 && tls > 0) ? 1000.0 / (tls + 1) : 0
                s_health = (h_ok == 1) ? 1000.0 / (h_ms + 1) : 0
                
                # Normalize throughput (higher is better, convert to kbps)
                s_thr = (thr > 0) ? thr / 1024.0 : 0
                
                # Normalize stability (0.0 to 1.0 range)
                s_stab = (p_stab + h_stab) / 2.0
                
                # Calculate weighted score
                score = (w_lat * s_lat) + (w_ping * s_ping) + (w_tcp * s_tcp) + \
                        (w_thr * s_thr) + (w_tls * s_tls) + (w_health * s_health) + \
                        (w_stab * s_stab)
                
                printf("%.6f", score)
              }')
            
            # Geographic bonus
            if echo "${{ env.PRIORITY_LOCATIONS }}" | grep -q "$GEO_CODE"; then
              RAW_SCORE=$(awk -v s="$RAW_SCORE" -v b="${{ env.W_GEO_BONUS }}" 'BEGIN{printf("%.6f", s+b)}')
            fi
            
            # Save metrics
            echo "$RAW_SCORE $SCANNER_LAT $REAL_PING_MS $TCP_RTT_MS $THROUGHPUT_BPS $TLS_MS $HEALTH_OK $HEALTH_MS $HEALTH_CODE $PING_STABILITY $HTTP_STABILITY $GEO_CODE $IP_CLEAN" >> "$SCORES_FILE"
            
            # Save NDJSON metrics
            jq -nc \
              --arg ip "$IP_CLEAN" \
              --arg geo "$GEO_CODE" \
              --argjson scan_lat "$SCANNER_LAT" \
              --argjson ping "$REAL_PING_MS" \
              --argjson tcp "$TCP_RTT_MS" \
              --argjson throughput "$THROUGHPUT_BPS" \
              --argjson tls "$TLS_MS" \
              --argjson h_ok "$HEALTH_OK" \
              --argjson h_ms "$HEALTH_MS" \
              --argjson h_code "$HEALTH_CODE" \
              --argjson p_stab "$PING_STABILITY" \
              --argjson h_stab "$HTTP_STABILITY" \
              --argjson score "$RAW_SCORE" \
              '{
                ip: $ip,
                geo: $geo,
                scanner_latency_ms: $scan_lat,
                ping_ms: $ping,
                tcp_rtt_ms: $tcp,
                throughput_bps: $throughput,
                tls_handshake_ms: $tls,
                health_check_ok: $h_ok,
                health_latency_ms: $h_ms,
                health_status_code: $h_code,
                ping_stability: $p_stab,
                http_stability: $h_stab,
                score: $score
              }' >> "$METRICS_FILE"
            
            if [ "${{ env.DEBUG }}" = "true" ]; then
              echo "  → $IP_CLEAN: score=$RAW_SCORE, ping=${REAL_PING_MS}ms, throughput=${THROUGHPUT_BPS}bps"
            fi
            
          done < "$DISC_FILE"
          
          echo "::endgroup::"
          
          # ====================================================================
          # Generate Summary Report
          # ====================================================================
          
          echo "::group::Generating summary report"
          
          OUT_DIR="${GITHUB_WORKSPACE}/scan_results"
          mkdir -p "$OUT_DIR"
          
          # Copy full results
          cp "$METRICS_FILE" "$OUT_DIR/" || true
          cp "$SCORES_FILE" "$OUT_DIR/" || true
          
          # Generate top results summary
          if [ -s "$METRICS_FILE" ]; then
            jq -s "sort_by(-.score) | .[0:${{ env.MAX_RESULTS }}]" \
              "$METRICS_FILE" > "$OUT_DIR/${{ env.SUMMARY_OUTPUT }}"
            
            echo "📊 Summary Report:"
            echo "  Total hosts tested: $(wc -l < "$DISC_FILE")"
            echo "  Results saved: $OUT_DIR/${{ env.SUMMARY_OUTPUT }}"
            
            # Display top 5 results
            echo ""
            echo "🏆 Top 5 Results:"
            jq -r '.[] | "  \(.ip) - Score: \(.score | tonumber | floor) - Ping: \(.ping_ms)ms - Throughput: \(.throughput_bps/1024|floor)kbps"' \
              "$OUT_DIR/${{ env.SUMMARY_OUTPUT }}" | head -5
          fi
          
          echo "::endgroup::"
          
          echo "metrics_file=$OUT_DIR/${{ env.METRICS_OUTPUT }}" >> $GITHUB_OUTPUT
          echo "summary_file=$OUT_DIR/${{ env.SUMMARY_OUTPUT }}" >> $GITHUB_OUTPUT

      # ========================================================================
      # STEP 8: Save Best Proxy to Cloudflare D1
      # ========================================================================
      - name: Save best proxy to Cloudflare D1
        if: steps.validate.outputs.d1_enabled == 'true' && steps.advanced.outputs.summary_file != ''
        id: save_d1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          
          echo "::group::Saving best proxy to Cloudflare D1"
          
          SUMMARY_FILE="${{ steps.advanced.outputs.summary_file }}"
          
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "::error::Summary file not found: $SUMMARY_FILE"
            exit 1
          fi
          
          # Extract the top-scoring proxy (the best one)
          BEST_PROXY=$(jq -r '.[0]' "$SUMMARY_FILE")
          
          if [ "$BEST_PROXY" = "null" ] || [ -z "$BEST_PROXY" ]; then
            echo "::warning::No valid proxy found in results"
            exit 0
          fi
          
          # Extract individual fields
          BEST_IP=$(echo "$BEST_PROXY" | jq -r '.ip')
          BEST_SCORE=$(echo "$BEST_PROXY" | jq -r '.score')
          BEST_GEO=$(echo "$BEST_PROXY" | jq -r '.geo')
          BEST_PING=$(echo "$BEST_PROXY" | jq -r '.ping_ms')
          BEST_THROUGHPUT=$(echo "$BEST_PROXY" | jq -r '.throughput_bps')
          BEST_TLS=$(echo "$BEST_PROXY" | jq -r '.tls_handshake_ms')
          BEST_HEALTH_OK=$(echo "$BEST_PROXY" | jq -r '.health_check_ok')
          BEST_HEALTH_CODE=$(echo "$BEST_PROXY" | jq -r '.health_status_code')
          PING_STAB=$(echo "$BEST_PROXY" | jq -r '.ping_stability')
          HTTP_STAB=$(echo "$BEST_PROXY" | jq -r '.http_stability')
          
          # Get current timestamp in ISO 8601 format
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "🎯 Best Proxy Selected:"
          echo "  IP: $BEST_IP"
          echo "  Score: $BEST_SCORE"
          echo "  Location: $BEST_GEO"
          echo "  Ping: ${BEST_PING}ms"
          echo "  Throughput: $(awk -v t="$BEST_THROUGHPUT" 'BEGIN{printf("%.2f", t/1024/1024)}') Mbps"
          
          # Prepare SQL INSERT statement
          # Table structure for proxy_updates:
          # CREATE TABLE proxy_updates (
          #   id INTEGER PRIMARY KEY AUTOINCREMENT,
          #   ip TEXT NOT NULL,
          #   score REAL,
          #   geo_code TEXT,
          #   ping_ms INTEGER,
          #   throughput_bps INTEGER,
          #   tls_handshake_ms INTEGER,
          #   health_ok INTEGER,
          #   health_status_code INTEGER,
          #   ping_stability REAL,
          #   http_stability REAL,
          #   discovered_at TEXT,
          #   created_at TEXT DEFAULT CURRENT_TIMESTAMP
          # );
          
          SQL_QUERY="INSERT INTO proxy_updates (ip, score, geo_code, ping_ms, throughput_bps, tls_handshake_ms, health_ok, health_status_code, ping_stability, http_stability, discovered_at) VALUES ('${BEST_IP}', ${BEST_SCORE}, '${BEST_GEO}', ${BEST_PING}, ${BEST_THROUGHPUT}, ${BEST_TLS}, ${BEST_HEALTH_OK}, ${BEST_HEALTH_CODE}, ${PING_STAB}, ${HTTP_STAB}, '${TIMESTAMP}');"
          
          # Create API request payload
          API_PAYLOAD=$(jq -nc \
            --arg sql "$SQL_QUERY" \
            '{sql: $sql}')
          
          # Make API call to Cloudflare D1
          echo "Sending data to Cloudflare D1..."
          
          API_RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${CLOUDFLARE_D1_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$API_PAYLOAD")
          
          # Check if the request was successful
          SUCCESS=$(echo "$API_RESPONSE" | jq -r '.success')
          
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Successfully saved best proxy to Cloudflare D1"
            echo "saved_to_d1=true" >> $GITHUB_OUTPUT
            echo "best_proxy_ip=$BEST_IP" >> $GITHUB_OUTPUT
            
            # Save response for debugging
            echo "$API_RESPONSE" > "${GITHUB_WORKSPACE}/scan_results/d1_response.json"
          else
            ERROR_MSG=$(echo "$API_RESPONSE" | jq -r '.errors[0].message // "Unknown error"')
            echo "::error::Failed to save to D1: $ERROR_MSG"
            echo "API Response: $API_RESPONSE"
            echo "saved_to_d1=false" >> $GITHUB_OUTPUT
          fi
          
          echo "::endgroup::"

      # ========================================================================
      # STEP 9: Upload Results as Artifacts
      # ========================================================================
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: |
            scan_results/
          retention-days: 30
          compression-level: 9

      # ========================================================================
      # STEP 10: Generate Job Summary
      # ========================================================================
      - name: Generate job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🔍 Proxy Scanner Results
          
          ## Configuration
          - **Targets**: ${{ env.TARGETS || 'None specified' }}
          - **Scanners**: Masscan=${{ env.USE_MASSCAN }}, ZMap=${{ env.USE_ZMAP }}, RScanner=${{ env.USE_RSCANNER }}
          - **Discovered IPs**: ${{ steps.discover.outputs.discovered_count || 0 }}
          
          ## Results
          - **Metrics File**: `${{ steps.advanced.outputs.metrics_file || 'N/A' }}`
          - **Summary File**: `${{ steps.advanced.outputs.summary_file || 'N/A' }}`
          - **Saved to D1**: ${{ steps.save_d1.outputs.saved_to_d1 || 'false' }}
          - **Best Proxy IP**: ${{ steps.save_d1.outputs.best_proxy_ip || 'N/A' }}
          
          ## Cloudflare D1 Integration
          - **D1 Database ID**: `${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}`
          - **Status**: ${{ steps.validate.outputs.d1_enabled == 'true' && '✅ Enabled' || '⚠️ Not configured' }}
          
          ## Next Steps
          1. Download the artifacts from this workflow run
          2. Review the summary JSON for top-scoring proxies
          3. Check your Cloudflare D1 database `proxy_updates` table for the saved proxy
          4. Query D1 to retrieve historical proxy data
          
          EOF

  # ============================================================================
  # Cleanup Job - Remove old workflow runs
  # ============================================================================
  cleanup-runs:
    name: Cleanup old workflow runs
    runs-on: ubuntu-latest
    needs: smartping
    if: always()
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 3
