name: Rust Proxy Scanner - SmartPing Adaptive AI Edition

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours

concurrency:
  group: rust-proxy-smartping
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan.log
  SCANNER_TIMEOUT: "600"
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  REAL_PING_TESTS: "3" # Number of actual ping tests per IP

jobs:
  smartping:
    name: Build → Scan → Real Network Test → Adaptive D1 Update
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl geoip-bin build-essential pkg-config libssl-dev ca-certificates coreutils iputils-ping

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Rust scanner
        run: cargo build --release

      - name: Learn adaptive regions from D1
        id: learn
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
        run: |
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CF_DATABASE_ID}/query"
          AUTH="Authorization: Bearer ${CF_API_TOKEN}"

          echo "🧠 Fetching historical performance data..."
          RESULT=$(curl -s -X POST -H "${AUTH}" -H "Content-Type: application/json" \
            --data '{"sql":"SELECT location, AVG(score) AS avg_score FROM proxy_history GROUP BY location;"}' "$API")

          LOCS=$(echo "$RESULT" | jq -r '.result[0].results[] | "\(.location):\(.avg_score)"' || true)
          TOP=$(echo "$LOCS" | sort -t':' -k2 -nr | head -n5 | cut -d':' -f1 | tr '\n' ',' | sed 's/,$//')
          [ -z "$TOP" ] && TOP="${{ env.PRIORITY_LOCATIONS }}"
          echo "adaptive_locs=$TOP" >> "$GITHUB_OUTPUT"
          echo "Adaptive learning prioritized: $TOP"

      - name: Run Rust proxy scanner
        id: scan
        env:
          ADAPTIVE_LOCS: ${{ steps.learn.outputs.adaptive_locs }}
        run: |
          set -euo pipefail
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          TMPDIR=$(mktemp -d)
          LOCS="${ADAPTIVE_LOCS:-${{ env.PRIORITY_LOCATIONS }}}"

          echo "🌍 Adaptive scanning order: $LOCS"
          timeout "${{ env.SCANNER_TIMEOUT }}" "$BIN" > "$LOG" 2>&1 || true

          awk 'BEGIN{IGNORECASE=1}/PROXY[[:space:]]+LIVE/{
            if (match($0,/([0-9]{1,3}(\.[0-9]{1,3}){3})/,ip) && match($0,/\(([0-9]+)ms\)/,lat))
              print lat[1], ip[1]
          }' "$LOG" > "$TMPDIR/proxies.txt"

          TOTAL=$(wc -l < "$TMPDIR/proxies.txt" || echo 0)
          echo "Found $TOTAL valid proxies."

          if [ "$TOTAL" -eq 0 ]; then
            echo "bestip=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SCORE_FILE="$TMPDIR/scores.txt"
          echo "⚡ Measuring real network latency..."
          while read -r latency ip; do
            GEO=$(geoiplookup "$ip" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            LAT=${latency//[^0-9]/}
            [ -z "$LAT" ] && LAT=9999

            # Real ping measurement
            REAL_PING=9999
            if ping -c ${{ env.REAL_PING_TESTS }} -W 1 "$ip" >/tmp/pinglog 2>/dev/null; then
              REAL_PING=$(awk -F'/' '/avg/ {print int($5)}' /tmp/pinglog || echo 9999)
            fi

            GEO_BONUS=0
            case "$GEO" in
              ${LOCS//,/|}) GEO_BONUS=200 ;;
            esac

            SCORE=$(awk "BEGIN { print ((1000/($LAT+1)) + (1000/($REAL_PING+1)) + $GEO_BONUS) }")
            echo "$SCORE $LAT $REAL_PING $GEO $ip" >> "$SCORE_FILE"
          done < "$TMPDIR/proxies.txt"

          sort -nrk1,1 "$SCORE_FILE" > "$TMPDIR/sorted.txt"
          BEST=$(head -n 1 "$TMPDIR/sorted.txt")

          BEST_SCORE=$(echo "$BEST" | awk '{print $1}')
          BEST_LATENCY=$(echo "$BEST" | awk '{print $2}')
          BEST_REALPING=$(echo "$BEST" | awk '{print $3}')
          BEST_LOC=$(echo "$BEST" | awk '{print $4}')
          BEST_IP=$(echo "$BEST" | awk '{print $5}')

          echo "✅ Selected: $BEST_IP ($BEST_LOC) [Latency=${BEST_LATENCY}ms, RealPing=${BEST_REALPING}ms, Score=${BEST_SCORE}]"
          echo "bestip=$BEST_IP" >> "$GITHUB_OUTPUT"
          echo "location=$BEST_LOC" >> "$GITHUB_OUTPUT"
          echo "latency=$BEST_LATENCY" >> "$GITHUB_OUTPUT"
          echo "realping=$BEST_REALPING" >> "$GITHUB_OUTPUT"
          echo "score=$BEST_SCORE" >> "$GITHUB_OUTPUT"

      - name: Update Cloudflare D1 (SmartPing AI)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          IP: ${{ steps.scan.outputs.bestip }}
          LOC: ${{ steps.scan.outputs.location }}
          LAT: ${{ steps.scan.outputs.latency }}
          RP: ${{ steps.scan.outputs.realping }}
          SCORE: ${{ steps.scan.outputs.score }}
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CF_DATABASE_ID}/query"
          AUTH="Authorization: Bearer ${CF_API_TOKEN}"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Fetching current active record..."
          LAST=$(curl -s -X POST -H "${AUTH}" -H "Content-Type: application/json" \
            --data '{"sql":"SELECT ip FROM proxy_updates WHERE id=1;"}' "$API" \
            | jq -r '.result[0].results[0].ip // empty' || echo "")

          if [ "$IP" = "$LAST" ]; then
            echo "✅ IP unchanged — skipping update."
            exit 0
          fi

          esc() { printf '%s' "$1" | sed "s/'/''/g"; }
          IP_ESC=$(esc "$IP"); LOC_ESC=$(esc "$LOC")

          SQL1="INSERT OR REPLACE INTO proxy_updates (id, ip, location, latency, real_ping, score, updated_at)
                VALUES (1, '${IP_ESC}', '${LOC_ESC}', ${LAT:-0}, ${RP:-0}, ${SCORE:-0}, '${TS}');"
          SQL2="INSERT INTO proxy_history (ip, location, latency, real_ping, score, updated_at)
                VALUES ('${IP_ESC}', '${LOC_ESC}', ${LAT:-0}, ${RP:-0}, ${SCORE:-0}, '${TS}');"

          BODY="{\"sql\":\"BEGIN; ${SQL1} ${SQL2} COMMIT;\"}"
          STATUS=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST -H "${AUTH}" -H "Content-Type: application/json" --data "$BODY" "$API" || echo "000")

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✅ SmartPing update complete."
          else
            echo "❌ Update failed (HTTP $STATUS)"
            cat /tmp/resp || true
            exit 1
          fi

          echo ""
          echo "=============================="
          echo "✔ SmartPing D1 Update Done"
          echo "New IP: ${IP}"
          echo "Region: ${LOC}"
          echo "Latency: ${LAT}ms"
          echo "Real Ping: ${RP}ms"
          echo "Score: ${SCORE}"
          echo "Time: ${TS}"
          echo "=============================="
          
      - name: Upload Cloudflare logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cf-rest-logs-${{ github.run_id }}
          path: |
            /tmp/cf_*.log
            /tmp/cf_*_resp
          retention-days: 7
          if-no-files-found: ignore

  cleanup-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    needs: update-proxy-variable
    if: always() # Always run, even if the previous step fails
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          # Keep 0 days or the last 0 runs for debugging
          retain_days: 0
          keep_minimum_runs: 0
