name: Rust Proxy Scanner - SmartPing Adaptive AI (D1 only)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

concurrency:
  group: rust-proxy-smartping-d1
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan.log
  SCANNER_TIMEOUT: "600"        # seconds
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  REAL_PING_TESTS: "3"
  MAX_D1_RETRIES: "3"
  D1_RETRY_SLEEP: "2"

jobs:
  smartping:
    name: Build → Scan → Real Network Test → Update Cloudflare D1 (only)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          # essential tools + geoip + ping utility
          sudo apt-get install -y jq curl geoip-bin build-essential pkg-config libssl-dev ca-certificates coreutils iputils-ping netcat-openbsd

          # verify geoiplookup exists
          if ! command -v geoiplookup &>/dev/null; then
            echo "❌ geoiplookup not found after install!"
            exit 1
          fi
          echo "✅ System dependencies installed"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts and registry
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-cache-v1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-cache-v1-${{ runner.os }}-

      - name: Build Rust scanner (release)
        run: |
          set -euo pipefail
          echo "=> cargo build --release"
          if ! cargo build --release 2>&1 | tee build-output.log; then
            echo "❌ Cargo build failed. Showing last 200 lines:"
            tail -n 200 build-output.log || true
            exit 1
          fi
          ls -lah target/release/ || true
          if [ ! -f "${{ env.SCAN_BINARY }}" ]; then
            echo "❌ Scanner binary not found at ${{ env.SCAN_BINARY }}"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Run scanner & SmartPing scoring (select best) 
        id: scan
        timeout-minutes: 20
        run: |
          set -euo pipefail
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          LOCS="${{ env.PRIORITY_LOCATIONS }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          REAL_PING_TESTS="${{ env.REAL_PING_TESTS }}"

          : > "$LOG"
          if [ ! -x "$BIN" ]; then
            chmod +x "$BIN" || true
          fi

          # Run scanner with timeout; allow non-zero exit but capture output
          echo "=> Running scanner with timeout ${TIMEOUT}s"
          timeout "${TIMEOUT}s" "$BIN" > "$LOG" 2>&1 || true
          echo "=> Scanner finished (or timed out). Log saved to $LOG"

          # Parse PROXY LIVE lines robustly:
          # Accept patterns that include an IPv4 and an approximate latency (e.g., "(123ms)" or "(123 ms)")
          awk 'BEGIN{IGNORECASE=1}
            /PROXY[[:space:]]+LIVE/ {
              # find first IPv4
              if (match($0, /([0-9]{1,3}(\.[0-9]{1,3}){3})/, ip)) {
                # try to find latency inside parentheses or like "123ms"
                lat="9999";
                if (match($0, /\(([[:space:]]*([0-9]+)[[:space:]]*m?s)[[:space:]]*\)/, a)) {
                  lat = a[2];
                } else if (match($0, /([0-9]+)[[:space:]]*m?s/, b)) {
                  lat = b[1];
                }
                gsub(/[^0-9]/,"",lat)
                if (lat+0 <= 0) lat = 9999
                print lat+0, ip[1]
              }
            }' "$LOG" > "$TMPDIR/proxies.txt" || true

          TOTAL=$(wc -l < "$TMPDIR/proxies.txt" 2>/dev/null || echo 0)
          echo "=> Found $TOTAL candidate proxies"

          # If none, set empty outputs and exit gracefully
          if [ "$TOTAL" -eq 0 ]; then
            echo "bestip=" >> "$GITHUB_OUTPUT"
            echo "location=" >> "$GITHUB_OUTPUT"
            echo "latency=" >> "$GITHUB_OUTPUT"
            echo "realping=" >> "$GITHUB_OUTPUT"
            echo "score=" >> "$GITHUB_OUTPUT"
            echo "total_proxies=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SCORE_FILE="$TMPDIR/scores.txt"
          : > "$SCORE_FILE"

          echo "=> Performing GeoIP + real ping tests and computing scores..."
          while read -r lat ip; do
            # get country code/name from geoiplookup
            GEO_RAW=$(geoiplookup "$ip" 2>/dev/null || echo "")
            GEO=$(echo "$GEO_RAW" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            [ -z "$GEO" ] && GEO="XX"

            LAT=${lat//[^0-9]/}
            [ -z "$LAT" ] && LAT=9999

            REAL_PING=9999
            # ping with short timeout (1s) and small count; fallback safe handling
            if ping -c ${REAL_PING_TESTS} -W 1 "$ip" >/tmp/pinglog 2>/dev/null; then
              # extract average ms (linux format rtt min/avg/max/mdev = ...)
              # if not found, fallback to 9999
              AVG=$(awk -F'/' '/rtt/ {print $5} END{if(NR==0) print ""}' /tmp/pinglog || true)
              if [ -n "$AVG" ]; then
                # round to integer
                REAL_PING=$(printf "%.0f" "$AVG" 2>/dev/null || echo 9999)
              fi
            fi

            # GEO bonus: if GEO is in priority list => add significant bonus
            GEO_BONUS=0
            # create pattern to match any of LOCS tokens
            if echo ",${LOCS}," | grep -E ",${GEO}," >/dev/null 2>&1; then
              GEO_BONUS=200
            fi

            # Compute a heuristic score:
            # higher is better; combines scanner latency (LAT), real ping, and geo bonus.
            # Use safe AWK floating math
            SCORE=$(awk "BEGIN { lat=${LAT}; rp=${REAL_PING}; bonus=${GEO_BONUS}; score = (1000/(lat+1)) + (1000/(rp+1)) + bonus; printf \"%.6f\", score }")
            echo "$SCORE $LAT $REAL_PING $GEO $ip" >> "$SCORE_FILE"
          done < "$TMPDIR/proxies.txt"

          # Choose the highest score
          sort -nrk1,1 "$SCORE_FILE" > "$TMPDIR/sorted.txt"
          BEST_LINE=$(head -n 1 "$TMPDIR/sorted.txt" || true)

          if [ -z "$BEST_LINE" ]; then
            echo "bestip=" >> "$GITHUB_OUTPUT"
            echo "location=" >> "$GITHUB_OUTPUT"
            echo "latency=" >> "$GITHUB_OUTPUT"
            echo "realping=" >> "$GITHUB_OUTPUT"
            echo "score=" >> "$GITHUB_OUTPUT"
            echo "total_proxies=$TOTAL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEST_SCORE=$(echo "$BEST_LINE" | awk '{print $1}')
          BEST_LATENCY=$(echo "$BEST_LINE" | awk '{print $2}')
          BEST_REALPING=$(echo "$BEST_LINE" | awk '{print $3}')
          BEST_LOC=$(echo "$BEST_LINE" | awk '{print $4}')
          BEST_IP=$(echo "$BEST_LINE" | awk '{print $5}')

          echo "✅ Selected best: $BEST_IP ($BEST_LOC) [lat=${BEST_LATENCY}ms, realping=${BEST_REALPING}ms, score=${BEST_SCORE}]"
          echo "bestip=${BEST_IP}" >> "$GITHUB_OUTPUT"
          echo "location=${BEST_LOC}" >> "$GITHUB_OUTPUT"
          echo "latency=${BEST_LATENCY}" >> "$GITHUB_OUTPUT"
          echo "realping=${BEST_REALPING}" >> "$GITHUB_OUTPUT"
          echo "score=${BEST_SCORE}" >> "$GITHUB_OUTPUT"
          echo "total_proxies=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Upload build & scan logs (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartping-logs-${{ github.run_id }}
          path: |
            build-output.log
            ${{ env.SCAN_LOG }}
          retention-days: 7
          if-no-files-found: ignore

      - name: Update Cloudflare D1 (SmartPing AI)  # ONLY D1 update, no KV touches
        if: steps.scan.outputs.bestip != ''
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          IP: ${{ steps.scan.outputs.bestip }}
          LOC: ${{ steps.scan.outputs.location }}
          LAT: ${{ steps.scan.outputs.latency }}
          RP: ${{ steps.scan.outputs.realping }}
          SCORE: ${{ steps.scan.outputs.score }}
          MAX_D1_RETRIES: ${{ env.MAX_D1_RETRIES }}
          D1_RETRY_SLEEP: ${{ env.D1_RETRY_SLEEP }}
        run: |
          set -euo pipefail
          # Validate required secrets/inputs
          for v in CF_API_TOKEN CF_ACCOUNT_ID CF_DATABASE_ID IP; do
            if [ -z "${!v:-}" ]; then
              echo "❌ Required env/secret $v is missing"
              exit 1
            fi
          done

          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CF_DATABASE_ID}/query"
          AUTH_HDR="Authorization: Bearer ${CF_API_TOKEN}"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Get current active ip (id=1 assumed) to avoid unnecessary writes
          echo "=> Fetching current active D1 record..."
          CUR=$(curl -s -X POST -H "${AUTH_HDR}" -H "Content-Type: application/json" \
            --data '{"sql":"SELECT ip FROM proxy_updates WHERE id=1;"}' "$API" \
            | jq -r '.result[0].results[0].ip // empty' || echo "")

          if [ "$CUR" = "$IP" ]; then
            echo "✅ IP unchanged in D1 ($IP) — skipping update."
            exit 0
          fi

          # Escape single quotes for SQL literal safety
          esc() { printf "%s" "$1" | sed "s/'/''/g"; }
          IP_ESC=$(esc "$IP")
          LOC_ESC=$(esc "${LOC:-UNKNOWN}")
          LAT_N=${LAT:-0}
          RP_N=${RP:-0}
          SCORE_N=${SCORE:-0}

          SQL1="INSERT OR REPLACE INTO proxy_updates (id, ip, location, latency, real_ping, score, updated_at) VALUES (1, '${IP_ESC}', '${LOC_ESC}', ${LAT_N}, ${RP_N}, ${SCORE_N}, '${TS}');"
          SQL2="INSERT INTO proxy_history (ip, location, latency, real_ping, score, updated_at) VALUES ('${IP_ESC}', '${LOC_ESC}', ${LAT_N}, ${RP_N}, ${SCORE_N}, '${TS}');"
          BODY=$(jq -nc --arg sql "BEGIN; ${SQL1} ${SQL2} COMMIT;" '{"sql":$sql}')

          # Retry loop for D1 write
          attempt=0
          max_attempts=${MAX_D1_RETRIES}
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt+1))
            echo "=> D1 update attempt $attempt/$max_attempts..."
            STATUS=$(curl -s -o /tmp/d1_resp -w "%{http_code}" -X POST -H "${AUTH_HDR}" -H "Content-Type: application/json" --data "$BODY" "$API" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "✅ D1 update successful (HTTP $STATUS)"
              cat /tmp/d1_resp || true
              break
            else
              echo "⚠️ D1 update returned HTTP $STATUS"
              [ -s /tmp/d1_resp ] && echo "=> Response:" && cat /tmp/d1_resp
              if [ $attempt -lt $max_attempts ]; then
                sleep_seconds=$(( D1_RETRY_SLEEP * attempt ))
                echo "=> Retrying in ${sleep_seconds}s..."
                sleep $sleep_seconds
              else
                echo "❌ All D1 update attempts failed"
                exit 1
              fi
            fi
          done

          echo "=============================================="
          echo "✅ SmartPing D1 Update Done"
          echo "New IP: ${IP}"
          echo "Region: ${LOC_ESC}"
          echo "Latency: ${LAT_N} ms"
          echo "RealPing: ${RP_N} ms"
          echo "Score: ${SCORE_N}"
          echo "Updated: ${TS}"
          echo "=============================================="

  cleanup-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    needs: smartping
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
