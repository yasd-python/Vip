name: Rust Proxy Scanner - SmartPing Adaptive AI (D1 only) - FINAL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

concurrency:
  group: rust-proxy-smartping-d1-final
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  # Core scanner
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan.log
  SCANNER_TIMEOUT: "600"        # seconds
  PRIORITY_LOCATIONS: "US,DE,GB,NL,FR,SG,JP,CA,AU,CH"
  REAL_PING_TESTS: "3"

  # D1 update retry policy
  MAX_D1_RETRIES: "5"
  D1_RETRY_SLEEP: "2"

  # TCP test
  TCP_CONNECT_TESTS: "1"
  TCP_TEST_PORT: "80"

  # HTTP / throughput / TLS
  HEALTH_URL_PATH: "/favicon.ico"
  HEALTH_HTTP_TIMEOUT: "5"
  THROUGHPUT_MAX_BYTES: "200000"
  TLS_TEST_PORT: "443"
  TLS_TIMEOUT: "5"

  # Scoring weights (sensible defaults; adjust if you want a different policy)
  W_SCANNER_LATENCY: "0.18"
  W_REAL_PING: "0.22"
  W_TCP_RTT: "0.05"
  W_THROUGHPUT: "0.25"
  W_TLS_HANDSHAKE: "0.10"
  W_HEALTH: "0.10"
  W_STABILITY: "0.05"
  W_COST: "0.00"         # default neutral; set >0 and provide cost metadata if you want cost weighting
  W_GEO_BONUS: "200"

  # Behavior flags
  DRY_RUN: "false"       # when "true" skip writing to D1
  DEBUG: "false"         # when "true" emits verbose logs

  # Output files
  METRICS_OUTPUT: "metrics.ndjson"
  SUMMARY_OUTPUT: "scan_summary.json"

jobs:
  smartping:
    name: Build → Scan → Advanced Tests → Score → Update Cloudflare D1
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq curl geoip-bin build-essential pkg-config libssl-dev ca-certificates coreutils iputils-ping netcat-openbsd openssl
          if ! command -v geoiplookup &>/dev/null; then
            echo "❌ geoiplookup not found after install!"
            exit 1
          fi
          echo "✅ System dependencies installed"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts and registry
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-cache-final-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-cache-final-${{ runner.os }}-

      - name: Build Rust scanner (release)
        run: |
          set -euo pipefail
          echo "=> cargo build --release"
          if ! cargo build --release 2>&1 | tee build-output.log; then
            echo "❌ Cargo build failed. Showing last 200 lines:"
            tail -n 200 build-output.log || true
            exit 1
          fi
          ls -lah target/release/ || true
          if [ ! -f "${{ env.SCAN_BINARY }}" ]; then
            echo "❌ Scanner binary not found at ${{ env.SCAN_BINARY }}"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Run scanner & perform advanced tests + scoring
        id: scan
        timeout-minutes: 40
        run: |
          set -euo pipefail
          shopt -s nocasematch || true

          # --- envs ---
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          LOCS="${{ env.PRIORITY_LOCATIONS }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          REAL_PING_TESTS="${{ env.REAL_PING_TESTS }}"
          TCP_TESTS="${{ env.TCP_CONNECT_TESTS }}"
          TCP_PORT="${{ env.TCP_TEST_PORT }}"
          HEALTH_PATH="${{ env.HEALTH_URL_PATH }}"
          HEALTH_TIMEOUT="${{ env.HEALTH_HTTP_TIMEOUT }}"
          THROUGHPUT_BYTES="${{ env.THROUGHPUT_MAX_BYTES }}"
          TLS_PORT="${{ env.TLS_TEST_PORT }}"
          TLS_TIMEOUT="${{ env.TLS_TIMEOUT }}"

          # weights
          W_SCANNER_LATENCY="${{ env.W_SCANNER_LATENCY }}"
          W_REAL_PING="${{ env.W_REAL_PING }}"
          W_TCP_RTT="${{ env.W_TCP_RTT }}"
          W_THROUGHPUT="${{ env.W_THROUGHPUT }}"
          W_TLS_HANDSHAKE="${{ env.W_TLS_HANDSHAKE }}"
          W_HEALTH="${{ env.W_HEALTH }}"
          W_STABILITY="${{ env.W_STABILITY }}"
          W_COST="${{ env.W_COST }}"
          W_GEO_BONUS="${{ env.W_GEO_BONUS }}"

          DRY_RUN="${{ env.DRY_RUN }}"
          DEBUG="${{ env.DEBUG }}"
          METRICS_FILE="${TMPDIR}/${{ env.METRICS_OUTPUT }}"
          SUMMARY="${{ env.SUMMARY_OUTPUT }}"
          SCORE_RAW="${TMPDIR}/score_raw.txt"

          : > "$LOG"
          : > "$METRICS_FILE"
          : > "$SCORE_RAW"

          if [ ! -x "$BIN" ]; then chmod +x "$BIN" || true; fi

          echo "=> Running scanner with timeout ${TIMEOUT}s"
          # run scanner (don't fail the step if it times out; we still want to parse whatever output it produced)
          timeout "${TIMEOUT}s" "$BIN" > "$LOG" 2>&1 || true
          echo "=> Scanner finished (or timed out). Log saved to $LOG"

          # --- helper functions ---

          # retry_with_backoff used for raw tcp connect attempts (returns 0 on success)
          retry_with_backoff() {
            local host="$1"
            local port="$2"
            local max_retries=5
            local delay=2
            local retries=0
            while [ $retries -lt $max_retries ]; do
              if timeout 1 bash -c "cat < /dev/tcp/${host}/${port} >/dev/null 2>&1"; then
                return 0
              fi
              retries=$((retries + 1))
              sleep $delay
              delay=$((delay * 2))
            done
            return 1
          }

          measure_tcp_rtt() {
            host="$1"; port="$2"; attempts="$3"
            best=9999
            for i in $(seq 1 "$attempts"); do
              if retry_with_backoff "$host" "$port"; then
                start=$(date +%s%3N)
                # quickly open/close connection to measure minimal RTT
                timeout 2 bash -c "exec 3<>/dev/tcp/${host}/${port}" >/dev/null 2>&1 || true
                end=$(date +%s%3N)
                rtt=$((end-start))
                if [ "$rtt" -lt "$best" ]; then best=$rtt; fi
              fi
            done
            echo "$best"
          }

          measure_tls() {
            host="$1"; port="$2"; tout="$3"
            # measure TLS handshake time using openssl s_client with timeout
            start=$(date +%s%3N)
            if timeout "${tout}s" bash -c "echo | openssl s_client -connect ${host}:${port} -servername google.com >/dev/null 2>&1"; then
              end=$(date +%s%3N)
              echo $((end-start))
            else
              echo 9999
            fi
          }

          measure_http_and_throughput() {
            proto="$1"; host="$2"; path="$3"; tout="$4"; max_bytes="$5"
            # Use curl to fetch small resource, measure status, time (s), bytes downloaded
            TMP_BODY="${TMPDIR}/http_body_$$"
            : > "$TMP_BODY"
            # use --insecure because IP-based TLS may not have valid cert; suppress errors
            out=$(timeout "${tout}s" curl --max-time "${tout}" --insecure -sS -w "%{http_code},%{time_total},%{size_download}" -o "$TMP_BODY" "${proto}://${host}${path}" 2>/dev/null) || out=""
            if [ -z "$out" ]; then
              # failed
              printf "0,9999,0,000"
              return 0
            fi
            http_code=$(echo "$out" | cut -d',' -f1)
            time_total=$(echo "$out" | cut -d',' -f2)
            size_download=$(echo "$out" | cut -d',' -f3)
            # convert time_total (seconds) to milliseconds
            ms=$(awk -v t="$time_total" 'BEGIN{printf("%d", t*1000)}')
            # throughput in bps = bytes / seconds (avoid division by zero)
            if awk "BEGIN{exit !($time_total>0)}"; then
              bps=$(awk -v b="$size_download" -v t="$time_total" 'BEGIN{printf("%d", (b*8)/t)}')
            else
              bps=0
            fi
            # ensure health_ok: 1 if http code 200-399
            health_ok=0
            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 400 ]; then health_ok=1; fi
            printf "%d,%s,%d,%03d" "$health_ok" "$ms" "$bps" "$http_code"
            return 0
          }

          measure_stability() {
            host="$1"; pings="$2"; proto="$3"; path="$4"; tout="$5"
            # ping ratio
            succ_ping=0
            for i in $(seq 1 "$pings"); do
              if timeout 2 ping -c 1 -W 1 "$host" >/dev/null 2>&1; then succ_ping=$((succ_ping+1)); fi
            done
            ping_ratio=$(awk -v s="$succ_ping" -v t="$pings" 'BEGIN{printf("%.2f", (t>0)?s/t:0)}')
            # http ratio
            succ_http=0
            for i in $(seq 1 "$pings"); do
              # small timeout for cached failures
              if timeout "${tout}s" curl --max-time "${tout}" --insecure -sS -o /dev/null -w "%{http_code}" "${proto}://${host}${path}" 2>/dev/null | awk '{exit ($1>=200 && $1<400)?0:1}'; then
                succ_http=$((succ_http+1))
              fi
            done
            http_ratio=$(awk -v s="$succ_http" -v t="$pings" 'BEGIN{printf("%.2f", (t>0)?s/t:0)}')
            printf "%s,%s" "$ping_ratio" "$http_ratio"
          }

          # --- create proxies list from the scanner log ---
          # Try multiple heuristics to extract lines with IPs and optional latency numbers.
          PROXIES_FILE="${TMPDIR}/proxies.txt"
          : > "$PROXIES_FILE"

          # Common patterns: "PROXY LIVE <lat> <ip>" or "LIVE <ip>" or "PROXY: ip:port"
          # We'll search for IPv4 addresses in scanner log and (optionally) a preceding latency number.
          grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' "$LOG" | uniq | while read -r ip; do
            # attempt to find a latency number on same line (simple heuristic)
            lat=$(grep -n "$ip" "$LOG" | head -n1 | awk -F: '{print $2}' | grep -Eo '[0-9]+' || true)
            if [ -z "$lat" ]; then lat=9999; fi
            echo "${lat} ${ip}" >> "$PROXIES_FILE"
          done

          # If PROXIES_FILE empty -> no proxies found; exit gracefully
          if [ ! -s "$PROXIES_FILE" ]; then
            echo "No proxies were found in $LOG — exiting successfully."
            # still upload the log/empty metrics as artifacts if you want (not included here)
            exit 0
          fi

          # --- iterate proxies and run tests ---
          while read -r lat ip; do
            IP_CLEAN="${ip}"
            LAT=${lat//[^0-9]/}; [ -z "$LAT" ] && LAT=9999

            GEO_RAW=$(geoiplookup "$IP_CLEAN" 2>/dev/null || echo "")
            GEO=$(echo "$GEO_RAW" | awk -F': ' '{print $2}' | cut -d',' -f1 | tr -d ' ')
            [ -z "$GEO" ] && GEO="XX"

            # real ping
            REAL_PING=9999
            if ping -c ${REAL_PING_TESTS} -W 1 "$IP_CLEAN" >/tmp/pinglog 2>/dev/null; then
              AVG=$(awk -F'/' '/rtt/ {print $5} END{if(NR==0) print ""}' /tmp/pinglog || echo "")
              if [ -n "$AVG" ]; then REAL_PING=$(printf "%.0f" "$AVG" 2>/dev/null || echo 9999); fi
            fi

            # tcp rtt
            TCP_RTT=9999
            if [ "$TCP_TESTS" -gt 0 ]; then TCP_RTT=$(measure_tcp_rtt "$IP_CLEAN" "$TCP_PORT" "$TCP_TESTS" || echo 9999); fi

            # TLS handshake
            TLS_MS=9999
            TLS_MS=$(measure_tls "$IP_CLEAN" "$TLS_PORT" "$TLS_TIMEOUT" || echo 9999)

            # HTTP health & throughput (try https then http)
            HTTP_PROTO="https"
            HEALTH_RES=$(measure_http_and_throughput "$HTTP_PROTO" "$IP_CLEAN" "$HEALTH_PATH" "$HEALTH_TIMEOUT" "$THROUGHPUT_BYTES" || echo "0,9999,0,000")
            HEALTH_OK=$(echo "$HEALTH_RES" | cut -d',' -f1)
            if [ "$HEALTH_OK" -eq 0 ]; then
              HTTP_PROTO="http"
              HEALTH_RES=$(measure_http_and_throughput "$HTTP_PROTO" "$IP_CLEAN" "$HEALTH_PATH" "$HEALTH_TIMEOUT" "$THROUGHPUT_BYTES" || echo "0,9999,0,000")
            fi
            HEALTH_OK=$(echo "$HEALTH_RES" | cut -d',' -f1)
            HEALTH_LAT_MS=$(echo "$HEALTH_RES" | cut -d',' -f2)
            THROUGHPUT_BPS=$(echo "$HEALTH_RES" | cut -d',' -f3)
            HEALTH_STATUS_CODE=$(echo "$HEALTH_RES" | cut -d',' -f4)

            # stability
            STAB=$(measure_stability "$IP_CLEAN" 3 "$HTTP_PROTO" "$HEALTH_PATH" "$HEALTH_TIMEOUT" || echo "0,0")
            PING_RATIO=$(echo "$STAB" | cut -d',' -f1)
            HTTP_RATIO=$(echo "$STAB" | cut -d',' -f2)

            # compute raw score using AWK (floating math)
            RAW_SCORE=$(awk -v w_lat="$W_SCANNER_LATENCY" -v lat="$LAT" \
                          -v w_rp="$W_REAL_PING" -v rp="$REAL_PING" \
                          -v w_tcp="$W_TCP_RTT" -v tcp="$TCP_RTT" \
                          -v w_thr="$W_THROUGHPUT" -v thr="$THROUGHPUT_BPS" \
                          -v w_tls="$W_TLS_HANDSHAKE" -v tls="$TLS_MS" \
                          -v w_health="$W_HEALTH" -v health_ok="$HEALTH_OK" -v health_lat="$HEALTH_LAT_MS" \
                          -v w_stab="$W_STABILITY" -v ping_ratio="$PING_RATIO" -v http_ratio="$HTTP_RATIO" \
                          'BEGIN{
                             s_lat = (lat>0 ? 1000/(lat+1) : 0);
                             s_rp  = (rp>0 ? 1000/(rp+1) : 0);
                             s_tcp = (tcp<9999 && tcp>0 ? 1000/(tcp+1) : 0);
                             s_thr = (thr>0 ? thr/1024.0 : 0);
                             s_tls = (tls<9999 && tls>0 ? 1000/(tls+1) : 0);
                             s_health = (health_ok==1 ? (1000/(health_lat+1)) : 0);
                             s_stab = ( (ping_ratio + http_ratio) / 2.0 );
                             raw = (w_lat*s_lat) + (w_rp*s_rp) + (w_tcp*s_tcp) + (w_thr*s_thr) + (w_tls*s_tls) + (w_health*s_health) + (w_stab*s_stab);
                             printf("%.6f", raw);
                          }')

            # store raw metrics line (human readable)
            echo "${RAW_SCORE} ${LAT} ${REAL_PING} ${TCP_RTT} ${THROUGHPUT_BPS} ${TLS_MS} ${HEALTH_OK} ${HEALTH_LAT_MS} ${HEALTH_STATUS_CODE} ${PING_RATIO} ${HTTP_RATIO} ${GEO} ${IP_CLEAN}" >> "$SCORE_RAW"

            # append json ndjson line
            jq -nc --arg ip "$IP_CLEAN" --arg geo "$GEO" \
              --argjson lat "$LAT" --argjson realping "$REAL_PING" --argjson tcp "$TCP_RTT" \
              --argjson throughput "$THROUGHPUT_BPS" --argjson tls "$TLS_MS" \
              --argjson health_ok "$HEALTH_OK" --argjson health_lat "$HEALTH_LAT_MS" \
              --argjson health_status "$HEALTH_STATUS_CODE" --argjson ping_ratio "$PING_RATIO" --argjson http_ratio "$HTTP_RATIO" \
              --argjson raw "$RAW_SCORE" \
              '{ip:$ip,geo:$geo,latency:$lat,realping:$realping,tcp_rtt:$tcp,throughput_bps:$throughput,tls_ms:$tls,health_ok:$health_ok,health_latency_ms:$health_lat,health_status:$health_status,ping_ratio:$ping_ratio,http_ratio:$http_ratio,raw_score:$raw}' \
              >> "$METRICS_FILE"

            if [ "${DEBUG}" = "true" ]; then
              echo "DEBUG: metrics for $IP_CLEAN -> raw=$RAW_SCORE"
            fi

          done < "$PROXIES_FILE"

          echo "Scanning completed. Raw scores and metrics saved to:"
          echo " - $SCORE_RAW"
          echo " - $METRICS_FILE"

          # copy metrics to repository workspace so other steps can access (optional)
          cp "$METRICS_FILE" "${GITHUB_WORKSPACE}/$(basename "$METRICS_FILE")" || true
          cp "$SCORE_RAW" "${GITHUB_WORKSPACE}/$(basename "$SCORE_RAW")" || true

          # Create a simple summary JSON (top 5 by raw score)
          if command -v jq >/dev/null 2>&1 && [ -s "$METRICS_FILE" ]; then
            jq -s 'sort_by(-.raw_score) | .[0:5]' "$METRICS_FILE" > "${GITHUB_WORKSPACE}/${SUMMARY}" || true
            echo "Summary saved to ${SUMMARY}"
          fi

          # keep job successful
          exit 0

  cleanup-runs:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    needs: smartping
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
