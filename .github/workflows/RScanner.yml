name: Rust Proxy Scanner (Ultimate KV + Git)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */24 * * *'  # هر 24 ساعت یکبار

env:
  CARGO_TERM_COLOR: always
  CACHE_FILE: .cachelastbestip.txt
  RUST_CACHE_KEY: v4
  SCAN_BINARY: ./target/release/RScanner
  SCAN_LOG: scan.log
  SCANNER_TIMEOUT: "600"
  MAX_CF_RETRIES: "5"
  CF_RETRY_BASE_SLEEP: "2"

jobs:
  scan-and-update:
    name: Scan Proxies → Update KV → Commit to Git
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # ========== مرحله 1: آماده‌سازی محیط ==========
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install System Dependencies
        run: |
          set -euo pipefail
          echo "🔧 Installing system packages..."
          sudo apt-get update -y
          sudo apt-get install -y jq curl netcat-openbsd build-essential \
            pkg-config libssl-dev ca-certificates coreutils
          echo "✅ System dependencies installed"

      # ========== مرحله 2: نصب و کش Rust ==========
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.RUST_CACHE_KEY }}-${{ runner.os }}
          cache-on-failure: true

      - name: Restore Best IP Cache
        uses: actions/cache@v4
        id: ip-cache
        with:
          path: ${{ env.CACHE_FILE }}
          key: rust-proxy-scanner-best-ip-${{ env.RUST_CACHE_KEY }}-${{ runner.os }}
          restore-keys: |
            rust-proxy-scanner-best-ip-${{ env.RUST_CACHE_KEY }}-
            rust-proxy-scanner-best-ip-

      # ========== مرحله 3: ساخت پروژه ==========
      - name: Build Rust Project (Release)
        run: |
          set -euo pipefail
          echo "🔨 Building Rust project in release mode..."
          if ! cargo build --release 2>&1 | tee build-output.log; then
            echo "❌ Build failed! Last 200 lines:"
            tail -n 200 build-output.log || true
            exit 1
          fi
          echo "✅ Build completed successfully"
          
          # بررسی وجود فایل باینری
          if [ ! -f "${{ env.SCAN_BINARY }}" ]; then
            echo "❌ ERROR: Binary not found at ${{ env.SCAN_BINARY }}"
            ls -lah target/release/ || true
            exit 1
          fi
          
          chmod +x "${{ env.SCAN_BINARY }}"
          echo "✅ Binary ready: ${{ env.SCAN_BINARY }}"

      # ========== مرحله 4: اجرای اسکنر و انتخاب بهترین IP ==========
      - name: Run Scanner and Select Best IP
        id: scan
        timeout-minutes: 15
        run: |
          set -euo pipefail
          echo "🔍 Starting proxy scanner..."
          
          BIN="${{ env.SCAN_BINARY }}"
          LOG="${{ env.SCAN_LOG }}"
          CACHE_FILE="${{ env.CACHE_FILE }}"
          TIMEOUT="${{ env.SCANNER_TIMEOUT }}"
          
          # ایجاد فایل‌های موقت
          TMPDIR=$(mktemp -d)
          CANDIDATES="$TMPDIR/candidates.txt"
          SCAN_OUT="$TMPDIR/scan_out.log"
          
          cleanup() {
            rm -rf "$TMPDIR" || true
          }
          trap cleanup EXIT
          
          # اجرای اسکنر با timeout
          set +e
          echo "⏱️  Running scanner (timeout: ${TIMEOUT}s)..."
          timeout "${TIMEOUT}s" "$BIN" > "$SCAN_OUT" 2>&1
          SCANNER_EXIT_CODE=$?
          set -e
          
          # بررسی نتیجه اجرا
          if [ "$SCANNER_EXIT_CODE" -eq 0 ]; then
            echo "✅ Scanner completed successfully"
          elif [ "$SCANNER_EXIT_CODE" -eq 124 ]; then
            echo "⚠️  Scanner timed out (will use partial results)"
          else
            echo "⚠️  Scanner exited with code ${SCANNER_EXIT_CODE} (will try to parse results)"
          fi
          
          # ذخیره خروجی کامل
          cp "$SCAN_OUT" "$LOG" || true
          
          # پارس کردن نتایج و یافتن بهترین IP
          echo "📊 Parsing scan results..."
          
          # استخراج IP های زنده با پینگ
          grep -E "PROXY LIVE.*\([0-9]+ ms\)" "$SCAN_OUT" | \
            grep -oE "[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+.*\([0-9]+ ms\)" > "$CANDIDATES" || true
          
          if [ ! -s "$CANDIDATES" ]; then
            echo "❌ No live proxies found!"
            if [ -f "$CACHE_FILE" ] && [ -s "$CACHE_FILE" ]; then
              echo "📦 Using cached IP from previous run"
              BEST_IP=$(cat "$CACHE_FILE")
              BEST_PING="cached"
            else
              echo "❌ No cached IP available either"
              exit 1
            fi
          else
            # مرتب‌سازی بر اساس پینگ و انتخاب بهترین
            TOTAL_COUNT=$(wc -l < "$CANDIDATES")
            echo "📈 Found ${TOTAL_COUNT} live proxies"
            
            # استخراج IP و پینگ، سپس مرتب‌سازی
            awk '{
              match($0, /([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+).*\(([0-9]+) ms\)/, arr)
              if (arr[1] && arr[2]) {
                print arr[2] " " arr[1]
              }
            }' "$CANDIDATES" | sort -n | head -1 > "$TMPDIR/best.txt"
            
            if [ -s "$TMPDIR/best.txt" ]; then
              read BEST_PING BEST_IP < "$TMPDIR/best.txt"
              echo "🏆 Best IP selected: $BEST_IP (ping: ${BEST_PING}ms)"
              
              # ذخیره در کش
              echo "$BEST_IP" > "$CACHE_FILE"
            else
              echo "❌ Failed to parse best IP"
              exit 1
            fi
          fi
          
          # خروجی برای استفاده در مراحل بعد
          echo "bestip=$BEST_IP" >> $GITHUB_OUTPUT
          echo "bestping=$BEST_PING" >> $GITHUB_OUTPUT
          echo "total_proxies=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          
          echo "✅ Scan completed - Best IP: $BEST_IP"

      # ========== مرحله 5: آپدیت Cloudflare KV ==========
      - name: Update Cloudflare KV with Best IP
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_KV_KEY: ${{ secrets.CF_KV_KEY || 'PROXYIP' }}
        run: |
          set -euo pipefail
          
          BEST_IP="${{ steps.scan.outputs.bestip }}"
          BEST_PING="${{ steps.scan.outputs.bestping }}"
          TOTAL="${{ steps.scan.outputs.total_proxies }}"
          
          if [ -z "$BEST_IP" ]; then
            echo "❌ No IP to update in KV"
            exit 1
          fi
          
          echo "🔐 Updating Cloudflare KV..."
          echo "   Account: ${CF_ACCOUNT_ID:0:8}..."
          echo "   Namespace: ${CF_NAMESPACE_ID:0:8}..."
          echo "   Key: $CF_KV_KEY"
          echo "   Value: $BEST_IP (${BEST_PING}ms from ${TOTAL} proxies)"
          
          # ساخت metadata
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          METADATA=$(jq -n \
            --arg ip "$BEST_IP" \
            --arg ping "$BEST_PING" \
            --arg total "$TOTAL" \
            --arg time "$TIMESTAMP" \
            '{
              ip: $ip,
              ping_ms: $ping,
              total_scanned: $total,
              updated_at: $time,
              source: "github_actions"
            }')
          
          # آپدیت KV با retry logic
          MAX_RETRIES=${{ env.MAX_CF_RETRIES }}
          RETRY_SLEEP=${{ env.CF_RETRY_BASE_SLEEP }}
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Attempt $i/$MAX_RETRIES..."
            
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/cf_response.json \
              -X PUT \
              "https://api.cloudflare.com/v1/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_NAMESPACE_ID}/values/${CF_KV_KEY}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-raw "$BEST_IP")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Cloudflare KV updated successfully!"
              echo "📋 Response:"
              cat /tmp/cf_response.json | jq '.' || cat /tmp/cf_response.json
              break
            else
              echo "⚠️  Request failed with HTTP $HTTP_CODE"
              cat /tmp/cf_response.json || true
              
              if [ $i -lt $MAX_RETRIES ]; then
                SLEEP_TIME=$((RETRY_SLEEP * i))
                echo "⏳ Waiting ${SLEEP_TIME}s before retry..."
                sleep $SLEEP_TIME
              else
                echo "❌ Failed to update KV after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
          
          # ذخیره metadata در فایل جداگانه (اختیاری)
          echo "$METADATA" > kv-metadata.json
          echo "💾 Metadata saved to kv-metadata.json"

      # ========== مرحله 6: Commit نتایج به Git ==========
      - name: Commit and Push Results
        if: success()
        run: |
          set -euo pipefail
          
          echo "📝 Committing scan results..."
          
          # تنظیم Git config
          git config --global user.name "NET-Sentinel Bot"
          git config --global user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          
          # اضافه کردن فایل‌های تغییر یافته
          git add sub/ProxyIP-Daily.md || true
          git add "${{ env.SCAN_LOG }}" || true
          git add "${{ env.CACHE_FILE }}" || true
          git add kv-metadata.json || true
          
          # بررسی تغییرات
          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit"
          else
            IRAN_TIME=$(TZ='Asia/Tehran' date '+%Y-%m-%d %H:%M:%S')
            BEST_IP="${{ steps.scan.outputs.bestip }}"
            COMMIT_MSG="🔄 Proxy scan completed at ${IRAN_TIME}
          
          Best IP: ${BEST_IP} (${{{ steps.scan.outputs.bestping }}}ms)
          Total scanned: ${{ steps.scan.outputs.total_proxies }} proxies
          Updated: Cloudflare KV + GitHub"
            
            git commit -m "$COMMIT_MSG"
            
            # امضای commit با اطلاعات جداگانه
            git -c committer.name="Diana-Cl" \
                -c committer.email="135276904+Diana-Cl@users.noreply.github.com" \
                commit --amend --no-edit
            
            # Push با force
            echo "⬆️  Pushing to GitHub..."
            git push origin main --force
            
            echo "✅ Results committed and pushed successfully"
          fi

      # ========== مرحله 7: خلاصه نهایی ==========
      - name: Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "        🎯 WORKFLOW SUMMARY 🎯"
          echo "═══════════════════════════════════════"
          echo "Best IP:      ${{ steps.scan.outputs.bestip }}"
          echo "Ping:         ${{ steps.scan.outputs.bestping }}ms"
          echo "Total Scans:  ${{ steps.scan.outputs.total_proxies }}"
          echo "KV Updated:   ✅"
          echo "Git Pushed:   ✅"
          echo "Time:         $(TZ='Asia/Tehran' date '+%Y-%m-%d %H:%M:%S') (Tehran)"
          echo "═══════════════════════════════════════"
